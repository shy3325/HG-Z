<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>后宫老纳传</title>
<!-- disable-default-loading -->
<style>
@import url("https://fontsapi.zeoseven.com/256/main/result.css");

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Huiwen-mincho", serif;
  font-weight: normal;
  width: 100vw;
  min-height: 100vh;
  overflow-x: hidden;
  background: #1a1a2e;
  color: #3c2415;
  font-size: 13px;
  position: relative;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
::-webkit-scrollbar-thumb { background: rgba(180,140,100,0.5); border-radius: 2px; }

/* ============ 封面页 ============ */
#cover-page {
  width: 100%;
  height: 100vh;
  background: url('https://res.cloudinary.com/dnezkz9ma/image/upload/v1776000986/kmvnahsreaf1plsmdmyc.jpg') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
}

#cover-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
}

.cover-title {
  position: relative;
  z-index: 2;
  font-size: 42px;
  color: #f5e6c8;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7), 0 0 20px rgba(212,175,55,0.4);
  letter-spacing: 12px;
  margin-bottom: 60px;
  animation: titleGlow 3s ease-in-out infinite;
}

@keyframes titleGlow {
  0%, 100% { text-shadow: 2px 2px 8px rgba(0,0,0,0.7), 0 0 20px rgba(212,175,55,0.3); }
  50% { text-shadow: 2px 2px 8px rgba(0,0,0,0.7), 0 0 35px rgba(212,175,55,0.6); }
}

.cover-buttons {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.cover-btn {
  padding: 12px 48px;
  background: linear-gradient(135deg, rgba(139,90,43,0.85), rgba(101,67,33,0.9));
  border: 1px solid rgba(212,175,55,0.5);
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 16px;
  letter-spacing: 6px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.3s;
}

.cover-btn:hover {
  background: linear-gradient(135deg, rgba(160,110,50,0.95), rgba(120,80,40,0.95));
  border-color: rgba(212,175,55,0.8);
  transform: scale(1.05);
}

/* ============ 角色创建页 ============ */
#creation-page {
  display: none;
  width: 100%;
  min-height: 100vh;
  background: linear-gradient(135deg, #f7f1e3 0%, #e8dcc8 50%, #f0e6d3 100%);
  padding: 16px;
  position: relative;
  overflow-y: auto;
}

.creation-container {
  max-width: 480px;
  margin: 0 auto;
  background: rgba(255,255,255,0.65);
  border-radius: 12px;
  padding: 20px;
  border: 1px solid rgba(180,150,100,0.3);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  overflow: hidden;
}

.creation-title {
  text-align: center;
  font-size: 22px;
  color: #5a3e28;
  margin-bottom: 20px;
  letter-spacing: 4px;
  border-bottom: 1px solid rgba(180,150,100,0.3);
  padding-bottom: 10px;
}

.avatar-selector {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 18px;
}

.avatar-preview {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid rgba(180,150,100,0.5);
  object-fit: cover;
  background: rgba(200,180,150,0.3);
}

.avatar-arrow {
  width: 30px;
  height: 30px;
  background: rgba(139,90,43,0.7);
  color: #f5e6c8;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
  flex-shrink: 0;
}

.avatar-arrow:hover { background: rgba(139,90,43,0.9); }

.form-group {
  margin-bottom: 12px;
}

.form-label {
  display: block;
  font-size: 12px;
  color: #6b4c30;
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.form-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.form-input {
  flex: 1;
  min-width: 0;
  padding: 6px 10px;
  border: 1px solid rgba(180,150,100,0.4);
  border-radius: 6px;
  background: rgba(255,255,255,0.7);
  font-family: "Huiwen-mincho", serif;
  font-size: 12px;
  color: #3c2415;
  outline: none;
  transition: 0.2s;
  width: 100%;
}

.form-input:focus {
  border-color: rgba(180,150,100,0.8);
  box-shadow: 0 0 6px rgba(180,150,100,0.2);
}

.gender-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.gender-btn {
  flex: 1;
  padding: 8px;
  border: 1px solid rgba(180,150,100,0.4);
  border-radius: 6px;
  background: rgba(255,255,255,0.5);
  color: #6b4c30;
  font-family: "Huiwen-mincho", serif;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
  text-align: center;
}

.gender-btn.active {
  background: linear-gradient(135deg, rgba(139,90,43,0.8), rgba(101,67,33,0.8));
  color: #f5e6c8;
  border-color: rgba(212,175,55,0.5);
}

.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px dashed rgba(180,150,100,0.2);
  gap: 4px;
}

.stat-name {
  font-size: 12px;
  color: #6b4c30;
  min-width: 50px;
  flex-shrink: 0;
}

.stat-value {
  font-size: 12px;
  color: #3c2415;
  font-weight: bold;
  min-width: 60px;
  text-align: center;
  flex-shrink: 0;
}

.dice-btn {
  width: 24px;
  height: 24px;
  background: rgba(139,90,43,0.6);
  color: #f5e6c8;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
  flex-shrink: 0;
}

.dice-btn:hover { background: rgba(139,90,43,0.9); transform: rotate(30deg); }

.talent-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px dashed rgba(180,150,100,0.2);
  gap: 4px;
}

.talent-level {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  min-width: 70px;
  text-align: center;
  flex-shrink: 0;
}

.talent-grey { color: #999; background: rgba(153,153,153,0.1); }
.talent-green { color: #4caf50; background: rgba(76,175,80,0.1); }
.talent-blue { color: #2196f3; background: rgba(33,150,243,0.1); }
.talent-purple { color: #9c27b0; background: rgba(156,39,176,0.1); }
.talent-red { color: #f44336; background: rgba(244,67,54,0.1); }

.start-btn {
  display: block;
  width: 100%;
  padding: 12px;
  margin-top: 16px;
  background: linear-gradient(135deg, #8b5a2b, #654321);
  border: 1px solid rgba(212,175,55,0.5);
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 15px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

.start-btn:hover {
  background: linear-gradient(135deg, #a06e3c, #7a5530);
  transform: scale(1.02);
}

/* ============ 序章过渡页 ============ */
#prologue-page {
  display: none;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

.prologue-text {
  max-width: 420px;
  color: #f5e6c8;
  font-size: 15px;
  line-height: 2.2;
  text-align: center;
  letter-spacing: 2px;
  opacity: 0;
  animation: fadeInText 2s forwards;
  white-space: pre-line;
}

@keyframes fadeInText {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.prologue-continue {
  margin-top: 40px;
  padding: 10px 36px;
  background: rgba(139,90,43,0.7);
  border: 1px solid rgba(212,175,55,0.4);
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  opacity: 0;
  animation: fadeInText 2s 2s forwards;
  letter-spacing: 3px;
}

/* ============ 主游戏页 ============ */
#game-page {
  display: none;
  width: 100%;
  min-height: 100vh;
  position: relative;
}

/* 顶部状态栏 */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(180deg, rgba(60,36,21,0.95), rgba(50,30,18,0.9));
  padding: 8px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(212,175,55,0.3);
  flex-wrap: wrap;
  gap: 4px;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #f5e6c8;
  font-size: 12px;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.top-info {
  color: #d4af37;
  font-size: 11px;
  letter-spacing: 1px;
}

.top-money {
  color: #f5e6c8;
  font-size: 11px;
}

.top-small-btn {
  padding: 3px 8px;
  background: rgba(139,90,43,0.6);
  border: 1px solid rgba(212,175,55,0.3);
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 10px;
  cursor: pointer;
  border-radius: 3px;
  transition: 0.2s;
}

.top-small-btn:hover { background: rgba(139,90,43,0.9); }

.stamina-display {
  color: #7bed9f;
  font-size: 11px;
}

/* 主内容区域 */
.game-content {
  width: 100%;
  min-height: calc(100vh - 90px);
  position: relative;
}

/* 底部导航 */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 100;
  background: linear-gradient(0deg, rgba(60,36,21,0.98), rgba(50,30,18,0.95));
  display: flex;
  border-top: 1px solid rgba(212,175,55,0.3);
}

.nav-btn {
  flex: 1;
  padding: 10px 0;
  background: none;
  border: none;
  color: #c9a96e;
  font-family: "Huiwen-mincho", serif;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: 0.2s;
  text-align: center;
}

.nav-btn.active {
  color: #f5e6c8;
  background: rgba(212,175,55,0.15);
}

.nav-btn:hover { color: #f5e6c8; }

/* ============ 寝宫页 ============ */
#palace-view {
  display: none;
  width: 100%;
  min-height: calc(100vh - 90px);
  background: url('https://res.cloudinary.com/dnezkz9ma/image/upload/v1775998635/rvrk8qtlmaolmjdm572a.png') center/cover no-repeat;
  padding: 12px;
  padding-bottom: 60px;
  position: relative;
}

.palace-stats-box {
  background: rgba(255,255,255,0.72);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid rgba(180,150,100,0.25);
  backdrop-filter: blur(4px);
}

.palace-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(180,150,100,0.2);
}

.palace-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid rgba(180,150,100,0.5);
  object-fit: cover;
  flex-shrink: 0;
}

.palace-name-info {
  flex: 1;
  min-width: 0;
}

.palace-name {
  font-size: 14px;
  color: #5a3e28;
  font-weight: bold;
}

.palace-rank {
  font-size: 11px;
  color: #8b7355;
  margin-top: 2px;
}

.palace-stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
}

.palace-stat-item {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 11px;
}

.palace-stat-label { color: #6b4c30; }
.palace-stat-val { color: #3c2415; font-weight: bold; }

/* 才艺面板 */
.talent-panel {
  background: rgba(255,255,255,0.65);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid rgba(180,150,100,0.25);
  backdrop-filter: blur(4px);
}

.talent-panel-title {
  font-size: 13px;
  color: #5a3e28;
  margin-bottom: 8px;
  letter-spacing: 2px;
  border-bottom: 1px solid rgba(180,150,100,0.2);
  padding-bottom: 4px;
}

.talent-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px dashed rgba(180,150,100,0.15);
  gap: 4px;
}

.talent-item-name {
  font-size: 11px;
  color: #6b4c30;
  min-width: 36px;
  flex-shrink: 0;
}

.talent-item-level {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  min-width: 65px;
  text-align: center;
  flex-shrink: 0;
}

.talent-btns {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.talent-action-btn {
  padding: 3px 8px;
  background: rgba(139,90,43,0.6);
  border: none;
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 10px;
  cursor: pointer;
  border-radius: 3px;
  transition: 0.2s;
}

.talent-action-btn:hover { background: rgba(139,90,43,0.9); }

/* 创作进度条 */
.creation-progress-box {
  display: none;
  background: rgba(255,255,255,0.7);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 12px;
  border: 1px solid rgba(180,150,100,0.25);
}

.progress-bar-outer {
  width: 100%;
  height: 14px;
  background: rgba(180,150,100,0.2);
  border-radius: 7px;
  overflow: hidden;
  margin: 6px 0;
}

.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #d4af37, #c9a96e);
  border-radius: 7px;
  transition: width 0.3s;
  width: 0%;
}

.progress-text {
  font-size: 10px;
  color: #6b4c30;
  text-align: center;
}

/* 仓库按钮 */
.inventory-float-btn {
  position: fixed;
  bottom: 58px;
  right: 12px;
  z-index: 99;
  padding: 8px 12px;
  background: linear-gradient(135deg, rgba(139,90,43,0.85), rgba(101,67,33,0.9));
  border: 1px solid rgba(212,175,55,0.4);
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 11px;
  cursor: pointer;
  border-radius: 20px;
  letter-spacing: 1px;
}

/* ============ 地图页 ============ */
#map-view {
  display: none;
  width: 100%;
  min-height: calc(100vh - 90px);
  background: url('https://res.cloudinary.com/dnezkz9ma/image/upload/v1775996901/xhejfpsihzerkhaeolsp.jpg') center/cover no-repeat;
  position: relative;
  padding-bottom: 60px;
}

.map-location-btn {
  position: absolute;
  padding: 8px 14px;
  background: rgba(60,36,21,0.8);
  border: 1px solid rgba(212,175,55,0.5);
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 11px;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.3s;
  letter-spacing: 1px;
  white-space: nowrap;
}

.map-location-btn:hover {
  background: rgba(139,90,43,0.9);
  transform: scale(1.08);
}

/* ============ 地点页 ============ */
#location-view {
  display: none;
  width: 100%;
  min-height: calc(100vh - 90px);
  position: relative;
  padding: 12px;
  padding-bottom: 60px;
  background-size: cover;
  background-position: center;
}

.location-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.2);
}

.location-content {
  position: relative;
  z-index: 2;
}

.location-title {
  text-align: center;
  font-size: 18px;
  color: #f5e6c8;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
  margin-bottom: 16px;
  letter-spacing: 3px;
  margin-top: 30px;
}

.location-back-btn {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 3;
  padding: 5px 12px;
  background: rgba(60,36,21,0.8);
  border: 1px solid rgba(212,175,55,0.4);
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 11px;
  cursor: pointer;
  border-radius: 4px;
}

.npc-list-in-location {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 20px;
}

.npc-card-small {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.7);
  border-radius: 8px;
  padding: 10px;
  border: 1px solid rgba(180,150,100,0.25);
  cursor: pointer;
  transition: 0.2s;
}

.npc-card-small:hover {
  background: rgba(255,255,255,0.85);
  transform: translateX(4px);
}

.npc-card-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(180,150,100,0.4);
  flex-shrink: 0;
  position: relative;
}

.npc-card-info {
  flex: 1;
  min-width: 0;
}

.npc-card-name {
  font-size: 12px;
  color: #5a3e28;
  font-weight: bold;
}

.npc-card-rank {
  font-size: 10px;
  color: #8b7355;
}

.npc-card-btns {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

/* ============ 人员页 ============ */
#personnel-view {
  display: none;
  width: 100%;
  min-height: calc(100vh - 90px);
  background: linear-gradient(135deg, #f7f1e3, #e8dcc8);
  padding: 12px;
  padding-bottom: 60px;
  overflow-x: auto;
}

.personnel-table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,255,255,0.7);
  border-radius: 8px;
  overflow: hidden;
  font-size: 11px;
}

.personnel-table th {
  background: rgba(60,36,21,0.85);
  color: #f5e6c8;
  padding: 8px 4px;
  text-align: center;
  letter-spacing: 1px;
  font-weight: normal;
}

.personnel-table td {
  padding: 7px 4px;
  text-align: center;
  border-bottom: 1px solid rgba(180,150,100,0.15);
  color: #3c2415;
}

.personnel-table tr:hover td {
  background: rgba(212,175,55,0.08);
}

.detail-btn {
  padding: 3px 8px;
  background: rgba(139,90,43,0.6);
  border: none;
  color: #f5e6c8;
  font-family: "Huiwen-mincho", serif;
  font-size: 10px;
  cursor: pointer;
  border-radius: 3px;
}

/* ============ 设置页 ============ */
#settings-view {
  display: none;
  width: 100%;
  min-height: calc(100vh - 90px);
  background: linear-gradient(135deg, #f7f1e3, #e8dcc8);
  padding: 12px;
  padding-bottom: 60px;
}

.settings-box {
  max-width: 480px;
  margin: 0 auto;
  background: rgba(255,255,255,0.7);
  border-radius: 10px;
  padding: 16px;
  border: 1px solid rgba(180,150,100,0.25);
}

.settings-title {
  font-size: 16px;
  color: #5a3e28;
  text-align: center;
  margin-bottom: 14px;
  letter-spacing: 3px;
}

.setting-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px dashed rgba(180,150,100,0.2);
}

.setting-label {
  font-size: 12px;
  color: #6b4c30;
  flex: 1;
}

.setting-select {
  padding: 4px 8px;
  border: 1px solid rgba(180,150,100,0.4);
  border-radius: 4px;
  background: rgba(255,255,255,0.8);

function rollServantTrait(){
  let typeRoll=Math.random();
  let selectedType=SERVANT_TRAIT_TYPES[Math.floor(typeRoll*SERVANT_TRAIT_TYPES.length)];
  let tiers=selectedType.tiers;
  let roll=Math.random(),cum=0,selectedTier=tiers[0];
  for(let t of tiers){cum+=t.rarity;if(roll<=cum){selectedTier=t;break;}}
  let trait={
    name:selectedType.baseName,
    desc:selectedType.desc,
    color:selectedTier.color,
    label:selectedTier.label,
    cost:selectedTier.cost,
    displayName:`${selectedType.baseName}·${selectedTier.label}`,
  };
  trait[selectedType.field]=selectedTier.value;
  return trait;
}

  if(GS.money.silver<0){let d=Math.ceil(Math.abs(GS.money.silver)/100);GS.money.gold-=d;GS.money.silver+=d*100;}

// 生成NPC词条
function rollConcubineTraits(npc){
  let traits=[];
  // 根据性别过滤
  let pool=CONCUBINE_TRAITS.filter(t=>{
    if(t.name==='异域贡女'&&npc.gender!=='female')return false;
    if(t.name==='异域贡男'&&npc.gender!=='male')return false;
    return true;
  });
  // 每个NPC有0~2个词条
  let count=Math.random()<0.3?0:(Math.random()<0.6?1:2);
  let used=new Set();
  for(let i=0;i<count;i++){
    let roll=Math.random();
    let cum=0;
    for(let t of pool){
      if(used.has(t.name))continue;
      cum+=t.rarity;
      if(roll<=cum){
        traits.push({...t});
        used.add(t.name);
        // 应用效果
        if(t.effect.fertilityBonus) npc.fertility=clamp(npc.fertility+t.effect.fertilityBonus,0,100);
        if(t.effect.schemingBonus) npc.scheming=clamp(npc.scheming+t.effect.schemingBonus,0,1000);
        if(t.effect.inclinationReduce) npc.inclination=clamp(npc.inclination-t.effect.inclinationReduce,0,100);
        if(t.effect.maxConstitution) npc.constitution=clamp(npc.constitution,0,t.effect.maxConstitution);
        break;
      }
    }
  }
  return traits;
}

function rollGender(type){
  if(type==='emperor'){let r=Math.random();return r<0.8?'male':'bisexual';}
  if(type==='empress_dowager'){let r=Math.random();return r<0.6?'female':'bisexual';}
  let r=Math.random();if(r<0.33)return 'female';if(r<0.66)return 'male';return 'bisexual';
}

function genderText(g){if(g==='male')return '男';if(g==='female')return '女';return '双性';}

function initVirginity(npc){

  else{v.frontHole='尚在';v.backHole='尚在';v.dickVirginity='尚在';}

}

function generateNPC(type,forcedRank,forcedGender){
  let gender=forcedGender||rollGender(type);
  let avatarGender=genderAvatarType(gender);
  let nameData=generateNPCName(avatarGender==='female'?'female':'male');
  let personality;
  if(type==='emperor'){personality=pick(EMPEROR_PERSONALITIES);}
  else if(type==='empress_dowager'){personality=pick(EMPRESS_DOWAGER_PERSONALITIES);}
  else personality=pick(CONCUBINE_PERSONALITIES);

  let age=type==='emperor'?rand(22,35):(type==='empress_dowager'?rand(45,60):rand(14,30));

  let talents={};
  TALENT_NAMES.forEach(t=>{talents[t]=type==='concubine'?rand(0,60):rand(10,50);});
  let hobby=pick(TALENT_NAMES);

  let npc={
    id:Date.now()+'_'+Math.random().toString(36).substr(2,6),
    type,
    surname:nameData.surname,
    given:nameData.given,
    fullName:nameData.full,
    nickname:'',
    gender,age,
    lifespan:rand(50,88),
    rank:forcedRank||'',
    personality,
    avatar:type==='emperor'?assignAvatar(avatarGender,true):assignAvatar(avatarGender),
    talents,hobby,
    charm:rand(100,800),
    constitution:rand(200,800),
    dickSize:(gender==='male'||gender==='bisexual')?rand(10,30):0,
    fertility:rand(20,80),
    scheming:rand(50,500),
    knowledge:type==='emperor'?rand(700,1000):rand(0,1000),
    inclination:rand(0,100),
    network:rand(20,200),
    experience:0,
    expCap:100,
    favor:type==='emperor'?rand(0,10):(type==='empress_dowager'?rand(-10,20):rand(-10,30)),
    love:type==='emperor'?rand(10,40):0,
    loveToEmperor:0,
    alive:true,
    inColdPalace:false,
    pregnant:false,
    pregnantMonth:0,
    pregnantFather:null,
    children:[],
    canBear:true,
    discovered:{personality:type==='emperor'?true:false,hobby:type==='emperor'?true:false,charm:type==='emperor'?true:false,constitution:type==='emperor'?true:false,fertility:type==='emperor'?true:false,scheming:type==='emperor'?true:false,inclination:type==='emperor'?true:false,talents:{}},
    servants:[],
    lastBedWithPlayer:null,
    isAlly:false,
    isRecruited:false,
    coerced:false,
    mood:type==='emperor'?70:50,
    traits:[],
    virginity:null,
    sexExperience:0,
    medicalThisYear:0,
  };
  npc.virginity=initVirginity(npc);
  initSexRecord(npc.id);
  TALENT_NAMES.forEach(t=>npc.discovered.talents[t]=type==='emperor'?true:false);

  // 妃子对皇帝的好感度
  if(type==='concubine'){
    npc.traits=rollConcubineTraits(npc);
    let hasSameGender=npc.traits.find(t=>t.effect&&t.effect.sameGenderOnly);
    if(hasSameGender&&npc.gender==='female'){
      npc.loveToEmperor=rand(-80,-30);
    }else{
      npc.loveToEmperor=rand(-20,90);
    }
    // 外戚干政的圣宠上限
    let hasForeignPower=npc.traits.find(t=>t.effect&&t.effect.foreignPower);
    if(hasForeignPower){
      npc.love=Math.min(npc.love,50);
    }
    // 资历上限根据位分
    npc.expCap=getExpCapForRank(npc.rank);
  }

  // 皇帝初始性经验（只使用鸡巴，穴和逼不使用）
  if(type==='emperor'){
    let initSex=rand(5,30);
    npc.sexExperience=initSex;
    GS.sexRecords[npc.id]={total:initSex,withEmperor:0,withPlayer:0,withOthers:initSex,log:[]};
    if(initSex>0){
      if(npc.virginity.dickVirginity) npc.virginity.dickVirginity='府邸妃嫔';
      // 皇帝的穴和逼保持"尚在"，历史上只用过鸡巴
    }
  }

  // 太后初始性经验
  if(type==='empress_dowager'){
    let initSex=rand(20,80);
    npc.sexExperience=initSex;
    GS.sexRecords[npc.id]={total:initSex,withEmperor:0,withPlayer:0,withOthers:initSex,log:[]};
    if(npc.virginity.frontHole) npc.virginity.frontHole='先帝';
    if(npc.virginity.backHole) npc.virginity.backHole='先帝';
    if(npc.virginity.dickVirginity) npc.virginity.dickVirginity='先帝';
  }

  return npc;
}

function getExpCapForRank(rankName){
  let rd=getRankData(rankName);
  if(!rd)return 20;
  return rd.expNeeded||20;
}

function startGame(){
  let surname=document.getElementById('input-surname').value.trim();
  let given=document.getElementById('input-givenname').value.trim();
  let nickname=document.getElementById('input-nickname').value.trim();
  if(!surname||!given){showToast('请输入姓名');return;}

  let pool=getAvatarPool();
  let playerAvatar=pool[currentAvatarIndex];
  GS.usedAvatars=[playerAvatar];

  let playerRank=pick(LOWEST_RANKS);
  let playerDickSize=(currentGender==='male'||currentGender==='bisexual')?creationStats.dickSize:0;
  GS.player={
    id:'player',type:'player',surname,given,fullName:surname+given,nickname:nickname||given,
    gender:currentGender,age:creationStats.age,lifespan:creationStats.lifespan,rank:playerRank,
    avatar:playerAvatar,talents:{...creationTalents},charm:creationStats.charm,
    constitution:creationStats.constitution,dickSize:playerDickSize,scheming:creationStats.scheming,
    knowledge:creationStats.knowledge,
    network:50,experience:0,hobby:pick(TALENT_NAMES),alive:true,inColdPalace:false,
    pregnant:false,pregnantMonth:0,children:[],canBear:true,servants:[],personality:'—',traits:[],
    virginity:initVirginity({gender:currentGender}),sexExperience:0,
  };
  initSexRecord('player');

  GS.date.era=pick(ERA_NAMES);GS.date.year=1;GS.date.month=9;GS.xun=0;GS.stamina=6;
  let sal=getSalary(playerRank);
  GS.money={gold:sal.gold,silver:sal.silver};
  GS.salaryPaid=true;

  GS.emperor=generateNPC('emperor');
  GS.emperor.rank='皇帝';
  GS.emperor.favor=rand(0,10);
  GS.metNPCs=[GS.emperor.id];

  GS.empressDowager=generateNPC('empress_dowager');
  GS.empressDowager.rank='太后';
  GS.metNPCs.push(GS.empressDowager.id);

  // 生成初始太医
  let doc=generateDoctor();
  GS.doctors.push(doc);
  GS.outsidePersonnel.push(doc);

  let concubineCount=rand(5,8);
  GS.concubines=[];
  let hasEmpress=Math.random()<0.4;
  for(let i=0;i<concubineCount;i++){
    let g=Math.random()<0.6?'female':'male';
    let npc=generateNPC('concubine',null,g);
    let rankIdx;
    if(i===0&&hasEmpress)rankIdx=0;
    else if(i<=2)rankIdx=rand(1,10);
    else rankIdx=rand(10,RANK_TABLE.length-4);
    npc.rank=assignRank(npc,rankIdx);
    npc.love=rand(10,60);
    npc.favor=rand(-10,30);
    npc.expCap=getExpCapForRank(npc.rank);
    // 外戚干政圣宠上限
    let hasFP=npc.traits.find(t=>t.effect&&t.effect.foreignPower);
    if(hasFP)npc.love=Math.min(npc.love,50);
    GS.concubines.push(npc);
    GS.metNPCs.push(npc.id);
  }

  // 初始化NPC之间的关系
  let allC=GS.concubines.filter(c=>c.alive);
  for(let i=0;i<allC.length;i++){
    for(let j=i+1;j<allC.length;j++){
      setNpcRelation(allC[i].id,allC[j].id,rand(-20,30));
    }
  }

  showPrologue();
}

  document.getElementById('creation-page').style.display='none';
  let pp=document.getElementById('prologue-page');
  pp.style.display='flex';
  let text=`${GS.date.era}元年，新帝${GS.emperor.fullName}龙御九五，登基即位。\n\n天下初定，百废待兴，帝下诏广开选秀，遴选天下秀女入宫充实后庭。\n\n${GS.player.fullName}，年方${GS.player.age}，于万千佳丽之中脱颖而出，蒙圣恩钦点，封为${GS.player.rank}，赐居偏殿。\n\n自此，踏入这深宫禁苑，荣辱浮沉，皆在一念之间……`;

}

function enterGame(){
  document.getElementById('prologue-page').style.display='none';
  document.getElementById('game-page').style.display='block';
  updateTopBar();switchTab('palace');
}

// ==================== 顶部栏 ====================
function updateTopBar(){
  document.getElementById('top-date').textContent=dateStr();
  document.getElementById('top-xun').textContent=xunText(GS.xun);
  document.getElementById('top-stamina').textContent=`⚡${GS.stamina}`;
  document.getElementById('top-money').textContent=moneyStr(GS.money);
  let moodEl=document.getElementById('top-mood');
  if(moodEl&&GS.emperorMood!==undefined)moodEl.textContent=`帝心:${GS.emperorMood}`;
}

// ==================== Tab切换 ====================
function switchTab(tab){
  ['palace-view','map-view','personnel-view','settings-view','location-view','bedchamber-view'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(tab==='palace'){document.getElementById('palace-view').style.display='block';document.querySelectorAll('.nav-btn')[0].classList.add('active');renderPalace();}
  else if(tab==='map'){document.getElementById('map-view').style.display='block';document.querySelectorAll('.nav-btn')[1].classList.add('active');renderMap();}
  else if(tab==='personnel'){document.getElementById('personnel-view').style.display='block';document.querySelectorAll('.nav-btn')[2].classList.add('active');renderPersonnel();}
  else if(tab==='settings'){document.getElementById('settings-view').style.display='block';document.querySelectorAll('.nav-btn')[3].classList.add('active');renderSettings();}
}

// ==================== 寝宫 ====================
function renderPalace(){
  let p=GS.player;
  let playerLove=GS.emperor?GS.emperor.favor:0;
  let lt=getLoveText(playerLove);
  let html=`    <div class="palace-stats-box">
    <div class="palace-header"><img class="palace-avatar" src="${p.avatar}" loading="lazy"><div class="palace-name-info"><div class="palace-name">${p.honorTitle?'「'+p.honorTitle+'」 ':''}${p.fullName}（${p.nickname}）</div><div class="palace-rank">${p.rank}${p.inColdPalace?' （冷宫）':''} · ${genderText(p.gender)}</div></div></div>
    <div class="palace-stats-grid">
      <div class="palace-stat-item"><span class="palace-stat-label">年龄</span><span class="palace-stat-val">${p.age}</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">寿元</span><span class="palace-stat-val">${p.lifespan}</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">魅力</span><span class="palace-stat-val">${p.charm}/1000</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">体质</span><span class="palace-stat-val">${p.constitution}/1000</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">尺寸</span><span class="palace-stat-val">${p.dickSize}cm</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">心机</span><span class="palace-stat-val">${p.scheming}</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">学识</span><span class="palace-stat-val">${p.knowledge||0}/1000</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">人脉</span><span class="palace-stat-val">${p.network}/1000</span></div>
      <div class="palace-stat-item"><span class="palace-stat-label">资历</span><span class="palace-stat-val">${p.experience||0}/${p.expCap||100}</span></div>
    </div>
    <div class="palace-stat-item" style="border-top:1px solid rgba(180,150,100,0.2);padding-top:6px;margin-top:4px;"><span class="palace-stat-label">宠爱</span><span class="palace-stat-val" style="color:${lt.color}">${lt.text}（${playerLove}）</span></div>
  </div>`;

  html+=`<div class="talent-panel"><div class="talent-panel-title">才 艺</div>`;
  TALENT_NAMES.forEach(t=>{
    let lv=getTalentLevelText(p.talents[t]);
    let actions=TALENT_ACTIONS[t];
    let btns=`<button class="talent-action-btn" onclick="doTalentAction('${t}','learn')">${actions.learn}</button><button class="talent-action-btn" onclick="doTalentAction('${t}','practice')">${actions.practice}</button>`;
    if(actions.create)btns+=`<button class="talent-action-btn" onclick="startCreation('${t}')">${actions.create}</button>`;
    html+=`<div class="talent-item"><span class="talent-item-name">${t}</span><span class="talent-item-level ${lv.cls}">${lv.text}</span><div class="talent-btns">${btns}</div></div>`;
  });
  html+=`</div>`;

  html+=`<div class="creation-progress-box" id="creation-progress-box"><div class="progress-text" id="creation-progress-name"></div><div class="progress-bar-outer"><div class="progress-bar-inner" id="creation-progress-bar"></div></div><div class="progress-text" id="creation-progress-pct"></div><button class="talent-action-btn" id="creation-continue-btn" onclick="continueCreation()" style="margin-top:6px">继续创作</button></div>`;

  html+=`<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">

function palaceSummonDoctor(){
  // 如果太医已经在场（本旬内已召见），直接打开交互界面
  if(GS._doctorPresent&&GS._doctorPresentDoc){
    openDoctorInteractPanel(GS._doctorPresentDoc);
    return;
  }
  // 冷却检查：三个月一次
  if(GS._lastDoctorSummon){
    let monthsSince=(GS.date.year-GS._lastDoctorSummon.year)*12+(GS.date.month-GS._lastDoctorSummon.month);
    if(monthsSince<3){
      let remaining=3-monthsSince;
      showToast(`太医近期已来过，需等待${remaining}个月后方可再次召见。`);
      return;
    }
  }
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  if(totalSilver()<50){showToast('银钱不足（需50银）');return;}
  let availableDoc=GS.doctors.find(d=>!d.pregnant);
  if(!availableDoc){
    availableDoc=generateDoctor();
    GS.doctors.push(availableDoc);
    GS.outsidePersonnel.push(availableDoc);
  }
  GS.stamina--;
  addMoney(0,-50);
  GS._lastDoctorSummon={year:GS.date.year,month:GS.date.month};
  GS._doctorPresent=true;
  GS._doctorPresentDoc=availableDoc;
  updateTopBar();
  showActionProgress(()=>{
    let gain=rand(50,100);
    GS.player.constitution=clamp(GS.player.constitution+gain,0,1000);
    updateTopBar();
    showToast(`太医诊脉调理，体质增加${gain}。太医将留至本旬结束。`);
    openDoctorInteractPanel(availableDoc);
  });
}

function openDoctorInteractPanel(doc){
  let html=`<div class="modal-title">太医在场</div><button class="modal-close" onclick="closeModal()">✕</button>
    <div class="npc-detail-header"><img class="npc-detail-avatar" src="${doc.avatar}" loading="lazy"><div><div class="npc-detail-name">${doc.fullName}</div><div class="npc-detail-rank">太医 · ${doc.personality} · ${genderText(doc.gender)}</div></div></div>
    <div class="modal-text" style="font-size:11px;color:#8b6914">太医将留至本旬结束，期间可反复交互。</div>
    <div style="font-size:11px;color:#6b4c30;margin:6px 0">好感：${doc.favor||0} · 孕率：${doc.fertility||0}%${doc.pregnant?' · <span style="color:#e74c3c">有孕在身</span>':''}</div>
    <button class="modal-btn" onclick="chatWithDoctorPalace('${doc.id}')">闲聊（⚡1）</button>
    <button class="modal-btn" onclick="bribeDoctorPalace('${doc.id}')">收买（5银·⚡1）</button>
    ${(doc.favor||0)>=80&&!doc.pregnant?'<button class="modal-btn interact-btn sexual" onclick="bedDoctorPalace(\''+doc.id+'\')">共赴巫山（⚡1）</button>':''}`;
  openModal(html);
}

function chatWithDoctorPalace(docId){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  showActionProgress(()=>{
    let doc=findDoctor(docId);if(!doc)return;
    doc.favor=clamp((doc.favor||0)+rand(2,5),-100,100);
    showToast(`与太医${doc.fullName}闲聊，好感增加。`);
    openDoctorInteractPanel(doc);
  });
}

function bribeDoctorPalace(docId){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  if(totalSilver()<5){showToast('银钱不足（需5银）');return;}
  GS.stamina--;
  addMoney(0,-5);updateTopBar();
  showActionProgress(()=>{
    let doc=findDoctor(docId);if(!doc)return;
    doc.favor=clamp((doc.favor||0)+rand(5,10),-100,100);
    showToast(`暗中塞了银子给太医，好感增加。`);
    openDoctorInteractPanel(doc);
  });
}

function bedDoctorPalace(docId){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  let doc=findDoctor(docId);if(!doc)return;
  closeModal();
  showActionProgress(()=>{
    doc.sexExperience=(doc.sexExperience||0)+1;
    GS.player.sexExperience=(GS.player.sexExperience||0)+1;
    addSexRecord(docId,'player',`与${GS.player.surname}${GS.player.rank}私通`);
    addNpcLog('player',`与太医${doc.fullName}私通`);
    takeVirginity(doc,'back',GS.player.fullName);
    showToast(`你与太医${doc.fullName}暗中行事……`);
    if(doc.canBear&&doc.fertility>0&&!doc.pregnant&&Math.random()*100<doc.fertility){
      doc.pregnant=true;
      doc.pregnantMonth=0;
      doc.pregnantFather='player';
      showToast(`太医${doc.fullName}似乎有了身孕……怀孕期间不得入后宫。`);
      addNpcLog('player',`太医${doc.fullName}怀上了你的孩子`);
    }
    renderPalace();
  });
}

function doTalentAction(talent,action){
  if(GS.stamina<=0){showToast('体力不足，已无余力');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  showActionProgress(()=>{
    let gain=rand(1,3);
    GS.player.talents[talent]=clamp(GS.player.talents[talent]+gain,0,100);
    let actionName=TALENT_ACTIONS[talent][action];
    let texts=[`凝神${actionName}，若有所悟，${talent}精进了。`,`潜心${actionName}，渐入佳境。`,`专注${actionName}，技法愈发纯熟。`,`用心${actionName}，功力渐长。`];
    let msg=pick(texts);
    // 更改6：30%概率增加学识
    if(Math.random()<0.3){
      let knowledgeGain=rand(3,5);
      GS.player.knowledge=clamp((GS.player.knowledge||0)+knowledgeGain,0,1000);
      msg+=` 学识+${knowledgeGain}`;
    }
    showToast(msg);updateTopBar();renderPalace();
  });
}

function startCreation(talent){
  if(GS.creationProgress){showToast('正有作品尚未完成');return;}
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  let tier=getItemTierName(GS.player.talents[talent]);
  let names=ARTWORK_NAMES[talent];
  let namePool=names[tier]||names.grey;
  GS.creationProgress={talent,name:pick(namePool),progress:0,tier};
  continueCreation();
}

function continueCreation(){
  if(!GS.creationProgress)return;
  if(GS.stamina<=0){showToast('体力不足，改日再续');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  showActionProgress(()=>{
    let gain=rand(5,15);
    GS.creationProgress.progress=clamp(GS.creationProgress.progress+gain,0,100);
    if(GS.creationProgress.progress>=100){
      let item={name:GS.creationProgress.name,type:'artwork',talent:GS.creationProgress.talent,tier:GS.creationProgress.tier,color:'item-'+GS.creationProgress.tier};
      GS.inventory.push(item);showToast(`「${item.name}」创作完成！`);GS.creationProgress=null;
    }else{showToast(`创作进度 ${GS.creationProgress.progress}%`);}
    updateTopBar();renderPalace();
  });
}

function checkAutoAdvance(){
  if(GS.stamina<=0){
    closeModal();
    ['location-view','bedchamber-view'].forEach(id=>{document.getElementById(id).style.display='none';});
    advanceXun();
  }
}

// ==================== 仓库 ====================
function showInventory(){
  let html=`<div class="modal-title">仓 库</div><button class="modal-close" onclick="closeModal()">✕</button>`;
  if(GS.inventory.length===0&&GS.handles.length===0){html+=`<div class="modal-text" style="text-align:center;color:#999">空空如也</div>`;}
  else{
    html+=`<div class="inventory-grid">`;
    GS.handles.forEach((h,i)=>{html+=`<div class="inv-item item-red"><div class="inv-item-name">📜 把柄</div><div class="inv-item-desc">${h.desc}</div><button class="talent-action-btn" style="margin-top:4px;font-size:9px" onclick="useHandle(${i})">使用</button></div>`;});
    GS.inventory.forEach((item,i)=>{
      let desc=item.desc||item.talent||'';
      html+=`<div class="inv-item ${item.color||''}"><div class="inv-item-name">${item.name}</div><div class="inv-item-desc">${desc}</div>${item.type==='good'||item.type==='poison'?`<button class="talent-action-btn" style="margin-top:4px;font-size:9px" onclick="useItem(${i})">使用</button>`:''}${item.type==='artwork'?`<div style="font-size:9px;color:#8b7355;margin-top:2px">可赠送</div>`:''}</div>`;
    });
    html+=`</div>`;
  }
  openModal(html);
}

function useItem(index){
  let item=GS.inventory[index];if(!item)return;
  let targets=getAllNPCs().filter(n=>n.alive&&n.type!=='player');
  let html=`<div class="modal-title">选择目标使用「${item.name}」</div><button class="modal-close" onclick="closeModal()">✕</button>`;
  // 用户自己也可以使用（仅限good类型药物）
  if(item.type==='good'){
    html+=`<button class="modal-btn" style="border:2px solid #d4af37" onclick="applyItemToSelf(${index})">自己服用</button>`;
  }
  targets.forEach(t=>{html+=`<button class="modal-btn" onclick="applyItem(${index},'${t.id}')">${t.surname}${t.rank||''}</button>`;});
  openModal(html);
}

function applyItemToSelf(index){
  let item=GS.inventory[index];if(!item)return;
  let eff=item.effect;let msg='';
  if(item.type==='good'){
    if(eff.constitution){let gain=rand(eff.constitution[0],eff.constitution[1]);GS.player.constitution=clamp(GS.player.constitution+gain,0,1000);msg=`服用「${item.name}」，体质增加${gain}。`;}
    if(eff.fertilityAdd){let gain=rand(eff.fertilityAdd[0],eff.fertilityAdd[1]);msg=`服用「${item.name}」，孕率提升。`;}
    if(eff.charmAdd){let gain=rand(eff.charmAdd[0],eff.charmAdd[1]);GS.player.charm=clamp(GS.player.charm+gain,0,1000);msg=`服用「${item.name}」，容颜更胜从前。`;}
    if(!msg)msg=`服用了「${item.name}」。`;
  }else if(item.type==='poison'){
    if(eff.charm){GS.player.charm=clamp(GS.player.charm+eff.charm,0,1000);msg=`服用「${item.name}」……你的容貌大损！`;}
    if(eff.fertility===0){GS.player.canBear=false;msg=`服用「${item.name}」……此后再无生育之望。`;}
    if(eff.lethal){GS.player.alive=false;msg=`「${item.name}」药效发作……你毒发身亡。`;}
    if(eff.miscarriage&&GS.player.pregnant){GS.player.pregnant=false;GS.player.pregnantMonth=0;GS.player.pregnantFather=null;msg=`服用「${item.name}」……你流产了。`;}
    if(!msg)msg=`服用了「${item.name}」，似乎不太妙……`;
  }
  GS.inventory.splice(index,1);showToast(msg);updateTopBar();closeModal();
}

function applyItem(index,targetId){
  let item=GS.inventory[index];let target=findNPC(targetId);if(!item||!target)return;
  let eff=item.effect;let msg='';
  if(item.type==='poison'){
    if(eff.charm){target.charm=clamp(target.charm+eff.charm,0,1000);msg=`对${target.surname}${target.rank}使用了「${item.name}」，其容貌大损！`;}
    if(eff.fertility===0){target.fertility=0;target.canBear=false;msg=`对${target.surname}${target.rank}使用了「${item.name}」，此后再无生育之望。`;}
    if(eff.lethal){target.alive=false;msg=`「${item.name}」药效发作，${target.surname}${target.rank}已香消玉殒。`;GS.emperorMood=clamp(GS.emperorMood-30,0,100);addNpcLog(targetId,'中毒身亡');}
    if(eff.miscarriage&&target.pregnant){target.pregnant=false;target.pregnantMonth=0;target.pregnantFather=null;msg=`「${item.name}」导致${target.surname}${target.rank}小产。`;GS.emperorMood=clamp(GS.emperorMood-15,0,100);addNpcLog(targetId,'遭人暗害，流产');}
  }else if(item.type==='good'){
    if(eff.constitution){let gain=rand(eff.constitution[0],eff.constitution[1]);target.constitution=clamp(target.constitution+gain,0,1000);msg=`赠予${target.surname}${target.rank}「${item.name}」，体质增加。`;target.favor=clamp(target.favor+5,-100,100);}
    if(eff.fertilityAdd){let gain=rand(eff.fertilityAdd[0],eff.fertilityAdd[1]);target.fertility=clamp(target.fertility+gain,0,100);msg=`赠予${target.surname}${target.rank}「${item.name}」，孕率提升。`;}
    if(eff.charmAdd){let gain=rand(eff.charmAdd[0],eff.charmAdd[1]);target.charm=clamp(target.charm+gain,0,1000);msg=`赠予${target.surname}${target.rank}「${item.name}」，容颜更胜从前。`;}
  }
  GS.inventory.splice(index,1);showToast(msg);closeModal();
}

function useHandle(index){
  let handle=GS.handles[index];if(!handle)return;
  let target=findNPC(handle.targetId);
  if(!target||!target.alive){showToast('此人已不在宫中');return;}
  let html=`<div class="modal-title">使用把柄</div><button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-text">你掌握了${target.surname}${target.rank}的秘密：${handle.desc}</div>
    <button class="modal-btn interact-btn sexual" onclick="handleForce(${index})">威胁其与你同房</button>
    <button class="modal-btn" onclick="handleBlackmail(${index})">以此要挟，使其听命于你</button>`;
  openModal(html);
}

function handleForce(index){
  let handle=GS.handles[index];let target=findNPC(handle.targetId);if(!target)return;
  target.favor=clamp(target.favor-30,-100,100);
  target.coerced=true;// 永久胁迫标记
  GS.handles.splice(index,1);// 把柄使用后从仓库消失
  showToast(`${target.surname}${target.rank}被迫屈从，满怀恨意。好感大减`);
  closeModal();triggerBedScene(target,true);
}

function coerceNPC(id){
  let npc=findNPC(id);if(!npc)return;
  npc.favor=clamp(npc.favor-10,-100,100);
  showToast(`你以把柄要挟${npc.surname}${npc.rank}，对方不得不从。`);
  closeModal();triggerBedScene(npc,true);
}

function handleBlackmail(index){
  let handle=GS.handles[index];let target=findNPC(handle.targetId);if(!target)return;
  target.favor=clamp(target.favor-15,-100,100);target.isRecruited=true;
  target.coerced=true;// 永久标记
  GS.handles.splice(index,1);// 把柄使用后从仓库消失
  GS.player.network=clamp(GS.player.network+20,0,1000);
  showToast(`${target.surname}${target.rank}迫于把柄，听命于你。人脉增加`);closeModal();
}

function renderMap(){
  const locations=[
    {key:'emperor_palace',name:LOCATION_NAMES.emperor_palace,top:'20%',left:'45%'},
    {key:'empress_dowager_palace',name:LOCATION_NAMES.empress_dowager_palace,top:'15%',left:'15%'},
    {key:'imperial_garden',name:LOCATION_NAMES.imperial_garden,top:'45%',left:'55%'},
    {key:'school',name:LOCATION_NAMES.school,top:'30%',left:'75%'},
    {key:'concubine_quarters',name:LOCATION_NAMES.concubine_quarters,top:'55%',left:'25%'},
    {key:'cold_palace',name:LOCATION_NAMES.cold_palace,top:'75%',left:'70%'},
    {key:'celestial_master',name:LOCATION_NAMES.celestial_master,top:'70%',left:'15%'},
    {key:'neiwufu',name:LOCATION_NAMES.neiwufu,top:'40%',left:'10%'},
    {key:'chonghua_palace',name:'重华宫',top:'35%',left:'35%'},

function visitLocation(key){
  let locView=document.getElementById('location-view');
  let bg=LOCATION_BGS[key]||LOCATION_BGS.default;
  if(key==='emperor_palace')bg=LOCATION_BGS.emperor_palace;
  locView.style.backgroundImage=`url('${bg}')`;
  locView.style.display='block';
  document.getElementById('map-view').style.display='none';

  let html=`<div class="location-overlay"></div><button class="location-back-btn" onclick="backToMap()">← 返回</button><div class="location-content"><div class="location-title">${LOCATION_NAMES[key]||key}</div>`;

  if(key==='emperor_palace') html+=renderEmperorPalaceVisit();
  else if(key==='empress_dowager_palace') html+=renderNPCLocation(GS.empressDowager);
  else if(key==='concubine_quarters') html+=renderConcubineQuarters();
  else if(key==='neiwufu') html+=renderNeiWuFu();
  else if(key==='imperial_garden') html+=`<div class="npc-list-in-location"><div style="color:#f5e6c8;font-size:12px;text-align:center;margin:20px 0">御花园花木扶疏，清风徐来。</div>${renderRandomEncounter()}</div>`;
  else if(key==='cold_palace') html+=renderColdPalaceWithCheck();

  html+=`</div>`;
  locView.innerHTML=html;
}

function renderEmperorPalaceVisit(){
  if(!GS._bribeBonus)GS._bribeBonus=0;
  if(!GS._bribedThisXun)GS._bribedThisXun=false;
  let canEnter=GS.emperor.favor>=50||getRankIndex(GS.player.rank)<=6;
  if(!canEnter){
    let bribeText=GS._bribedThisXun?'<div style="color:#d4af37;font-size:10px;margin-top:6px">本旬已贿赂过。当前额外侍寝概率：+'+Math.round(GS._bribeBonus*100)+'%</div>':'';
    return `<div style="color:#f5e6c8;font-size:12px;text-align:center;margin:20px 0">守门太监拦住了你的去路。\n\n"这位主子恕罪，此处非位份尊贵或深受圣恩者不可擅入。"\n\n（需圣宠≥50或位份≥妃）</div>
    ${!GS._bribedThisXun?'<button class="modal-btn" style="margin:10px auto;width:240px" onclick="bribeEunuchForBed()">贿赂太监（20银）提升侍寝概率</button>':''}
    ${bribeText}`;
  }
  if(GS.emperorVisitedThisMonth)return `<div style="color:#f5e6c8;font-size:12px;text-align:center;margin:20px 0">本月已觐见过皇帝，不可再入。</div>`;

  let html=`<div class="npc-list-in-location">
    <div style="text-align:center;margin:12px 0"><img src="${GS.emperor.avatar}" style="width:60px;height:60px;border-radius:50%;border:2px solid rgba(212,175,55,0.5);object-fit:cover" loading="lazy"></div>
    <div style="color:#f5e6c8;font-size:12px;text-align:center;margin-bottom:16px">${GS.emperor.fullName} · 皇帝<br>心情：${GS.emperorMood} · 宠爱：${GS.emperor.favor}</div>
    <button class="modal-btn" onclick="emperorPalacePerformTalent()">表演才艺（⚡1）</button>
    <button class="modal-btn" onclick="emperorPalacePraise()">为某人美言</button>
    <button class="modal-btn" onclick="emperorPalaceSlander()">说某人坏话</button>
    <button class="modal-btn interact-btn sexual" onclick="emperorPalaceDaylightSex()">白日宣淫</button>
  </div>`;
  return html;
}

function bribeEunuchForBed(){
  if(totalSilver()<20){showToast('银钱不足（需20银）');return;}
  if(GS._bribedThisXun){showToast('本旬已贿赂过，下旬再来。');return;}
  addMoney(0,-20);updateTopBar();
  GS._bribeBonus=(GS._bribeBonus||0)+0.05;
  GS._bribedThisXun=true;
  showToast(`太监收了银子，笑眯眯地点头道："奴才省得，定在陛下跟前多提您几句。"\n\n侍寝概率额外+5%（当前累计+${Math.round(GS._bribeBonus*100)}%）`);
  visitLocation('emperor_palace');
}

function emperorPalacePerformTalent(){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;
  GS.emperorVisitedThisMonth=true;
  let bestTalent='';let bestVal=0;
  TALENT_NAMES.forEach(t=>{if(GS.player.talents[t]>bestVal){bestVal=GS.player.talents[t];bestTalent=t;}});
  let gain=bestVal>60?rand(3,6):rand(1,3);
  let perfPrefBonus=getEmperorPreferenceBonus(GS.player);
  gain+=perfPrefBonus;
  GS.emperor.favor=clamp(GS.emperor.favor+gain,-100,100);
  let texts=[
    `你在御前献上一段${bestTalent}表演，皇帝颔首微笑，龙颜稍悦。`,
    `你施展${bestTalent}之技，殿中余韵悠长，皇帝目露赞赏。`,
    `一曲${bestTalent}毕，皇帝轻叩御案，似有嘉许之意。`,
  ];
  showToast(pick(texts));updateTopBar();backToMap();
}

function emperorPalacePraise(){
  let targets=GS.concubines.filter(c=>c.alive);// 包括冷宫中的
  let html=`<div class="modal-title">为谁美言？</div><button class="modal-close" onclick="closeModal()">✕</button>`;
  targets.forEach(c=>{
    let label=getNPCDisplayName(c)+(c.inColdPalace?' <span style="color:#f44336;font-size:9px">（冷宫）</span>':'');
    html+=`<button class="modal-btn" onclick="doPraise('${c.id}')">${label}</button>`;
  });
  openModal(html);
}

function doPraise(id){
  GS.emperorVisitedThisMonth=true;
  let npc=findNPC(id);if(!npc)return;
  let praisePrefBonus=getEmperorPreferenceBonus(npc);
  npc.love=clamp((npc.love||0)+rand(3,8)+praisePrefBonus,0,100);
  let hasFPPraise=npc.traits?.find(t=>t.effect&&t.effect.foreignPower);
  if(hasFPPraise)npc.love=Math.min(npc.love,50);
  showToast(`你在皇帝面前为${getNPCDisplayName(npc)}美言，其圣宠增加。`);
  addNpcLog('player',`在皇帝面前为${getNPCDisplayName(npc)}美言`);
  // 冷宫释放：如果该妃子在冷宫且圣宠变为正数
  if(npc.inColdPalace&&npc.love>0){
    npc.inColdPalace=false;
    npc.rank='更衣';// 重新从最低开始
    npc.experience=0;
    addNpcLog(npc.id,`蒙圣恩释出冷宫，降为更衣，重新侍奉。`);
    showToast(`${npc.surname}被释出冷宫，降为更衣。`);
  }
  closeModal();backToMap();
}

function emperorPalaceSlander(){
  let targets=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
  let html=`<div class="modal-title">说谁坏话？</div><button class="modal-close" onclick="closeModal()">✕</button>`;
  targets.forEach(c=>{html+=`<button class="modal-btn" onclick="doSlander('${c.id}')">${c.surname}${c.rank}</button>`;});
  openModal(html);
}

function doSlander(id){
  GS.emperorVisitedThisMonth=true;
  let npc=findNPC(id);if(!npc)return;
  npc.love=clamp((npc.love||0)-rand(3,8),0,100);
  // 有风险被发现
  if(Math.random()<0.2){
    GS.emperor.favor=clamp(GS.emperor.favor-5,-100,100);
    showToast(`你搬弄是非，皇帝似有察觉，对你略有不满。`);
  }else{
    showToast(`你在皇帝面前暗中诋毁${npc.surname}${npc.rank}，其圣宠降低。`);
  }
  addNpcLog('player',`在皇帝面前诋毁${npc.surname}${npc.rank}`);
  closeModal();backToMap();
}

function emperorPalaceDaylightSex(){
  if(GS.emperor.favor<40){showToast('皇帝对你并无此意。');return;}
  GS.emperorVisitedThisMonth=true;
  let daylightPrefBonus=getEmperorPreferenceBonus(GS.player);
  if(daylightPrefBonus!==0){
    GS.emperor.favor=clamp(GS.emperor.favor+daylightPrefBonus,-100,100);
  }
  triggerBedScene(GS.emperor,false);
}

function renderChonghuaPalace(){
  let kids=GS.children.filter(c=>c.alive);

function teachChild(childName){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  let child=GS.children.find(c=>c.name===childName);if(!child)return;
  if(child.age<6){showToast('年纪尚幼，无法教导');return;}
  let playerKnowledge=GS.player.talents['学识']||0;
  let knowledgeGain=clamp(Math.floor(playerKnowledge/30)+rand(1,3),1,3);
  let martialGain=rand(1,2);
  child.knowledge=clamp((child.knowledge||0)+knowledgeGain,0,child.talent);
  child.martial=clamp((child.martial||0)+martialGain,0,child.talent);
  child.favorToPlayer=clamp((child.favorToPlayer||0)+rand(2,5),0,100);
  showToast(`你教导${child.name}，其学识增加${knowledgeGain}，武艺增加${martialGain}。`);
}

function talkToChild(childName){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  let child=GS.children.find(c=>c.name===childName);if(!child)return;
  child.favorToPlayer=clamp((child.favorToPlayer||0)+rand(2,5),0,100);
  let texts=[`${child.name}眨着大眼睛看你，嘴角弯弯地笑了。`,`你与${child.name}聊了许久，孩子显得很开心。`,`${child.name}拉着你的衣角不肯松手，依依不舍。`];
  showToast(pick(texts));
}

function giftToChild(childName){
  let artworks=GS.inventory.filter(i=>i.type==='artwork');
  if(artworks.length===0){showToast('仓库中没有可赠送的物品');return;}
  let child=GS.children.find(c=>c.name===childName);if(!child)return;
  let html=`<div class="modal-title">赠予${child.name}</div><button class="modal-close" onclick="closeModal()">✕</button>`;
  artworks.forEach((item)=>{
    let origIdx=GS.inventory.indexOf(item);
    html+=`<button class="modal-btn" onclick="doGiftChild('${childName}',${origIdx})">${item.name}</button>`;
  });
  openModal(html);
}

function doGiftChild(childName,itemIdx){
  let child=GS.children.find(c=>c.name===childName);let item=GS.inventory[itemIdx];
  if(!child||!item)return;
  child.favorToPlayer=clamp((child.favorToPlayer||0)+rand(5,15),0,100);
  GS.inventory.splice(itemIdx,1);
  showToast(`${child.name}收到「${item.name}」，十分欢喜。`);
  closeModal();
}

    <div style="font-size:11px;color:#8b7355;text-align:center;margin-bottom:10px">将你的书画或刺绣作品交由姑姑代为售卖</div>`;
  artworks.forEach((item)=>{
    let origIdx=GS.inventory.indexOf(item);
    let price=getArtworkPrice(item.tier);
    html+=`<div class="recruit-card"><div><span style="font-size:11px;color:#3c2415">「${item.name}」</span><div style="font-size:9px;color:#8b7355">${item.talent} · <span class="talent-level ${item.tier==='grey'?'talent-grey':item.tier==='green'?'talent-green':item.tier==='blue'?'talent-blue':item.tier==='purple'?'talent-purple':'talent-red'}">${getTalentLevelText(item.tier==='grey'?10:item.tier==='green'?30:item.tier==='blue'?50:item.tier==='purple'?70:90).text}</span></div><div style="font-size:10px;color:#b8860b;margin-top:2px">售价：${moneyStr(price)}</div></div><button class="talent-action-btn" onclick="sellArtwork(${origIdx})">出售</button></div>`;
  });
  openModal(html);
}

function getArtworkPrice(tier){
  if(tier==='grey')return{gold:0,silver:5};
  if(tier==='green')return{gold:0,silver:15};
  if(tier==='blue')return{gold:0,silver:40};
  if(tier==='purple')return{gold:1,silver:0};
  if(tier==='red')return{gold:2,silver:50};
  return{gold:0,silver:5};
}

function sellArtwork(index){
  let item=GS.inventory[index];if(!item||item.type!=='artwork')return;
  let price=getArtworkPrice(item.tier);
  addMoney(price.gold,price.silver);
  GS.inventory.splice(index,1);
  showToast(`「${item.name}」已售出，获得${moneyStr(price)}。`);
  updateTopBar();showSellPanel();
}

function spyForInfo(){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  showActionProgress(()=>{
    let bonusChance=0;
    GS.player.servants.forEach(s=>{let sb=s.trait.spyBonus||0;bonusChance+=sb;});
    if(Math.random()<0.2+bonusChance){
      let gossip=pick(CRITICAL_GOSSIP);let target=null;
      let candidates=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
      if(candidates.length>0)target=pick(candidates);
      if(target){
        let handle={desc:gossip.text.replace('某位妃嫔',target.surname+target.rank),targetId:target.id};
        GS.handles.push(handle);showToast(`获得把柄！`);
      }else showToast(pick(GOSSIP_MESSAGES));
    }else showToast(pick(GOSSIP_MESSAGES));
  });
}

function showRecruitPanel(){
  let maxCount=getMaxServants(GS.player.rank);
  let currentCount=GS.player.servants.length;
  if(currentCount>=maxCount){showToast(`宫人已满`);return;}
  let candidates=generateServantCandidates(3);
  let html=`<div class="modal-title">招聘宫人</div><button class="modal-close" onclick="closeModal()">✕</button>
    <div style="font-size:11px;color:#8b7355;text-align:center;margin-bottom:8px">空位：${maxCount-currentCount}/${maxCount}</div>
    <button class="modal-btn" onclick="refreshRecruit()" style="margin-bottom:8px">🎲 刷新人选（⚡1）</button>`;
  candidates.forEach((c,i)=>{
    let costStr=moneyStr(c.trait.cost||{gold:0,silver:10});
    html+=`<div class="recruit-card"><div><span style="font-size:11px;color:#3c2415">${c.name}（${c.type}）</span><div class="recruit-traits"><span class="trait-tag ${c.trait.color}">${c.trait.displayName||c.trait.name}</span></div><div style="font-size:9px;color:#8b7355">${c.trait.desc}（${c.trait.label}）</div><div style="font-size:9px;color:#b8860b;margin-top:2px">费用：${costStr}</div></div><button class="talent-action-btn" onclick="hireServant(${i})">录用</button></div>`;
  });
  window._recruitCandidates=candidates;
  openModal(html);
}

function generateServantCandidates(count){
  let candidates=[];
  for(let i=0;i<count;i++){
    let type=Math.random()<0.5?'宫女':'太监';
    let gender=type==='宫女'?'female':'male';
    let nameData=generateNPCName(gender);
    let trait=rollServantTrait();
    candidates.push({name:nameData.full,type,gender,trait});
  }
  return candidates;
}

function refreshRecruit(){
  if(GS.stamina<=0){showToast('体力不足');return;}
  GS.stamina--;updateTopBar();showRecruitPanel();
}

function hireServant(index){
  let c=window._recruitCandidates[index];if(!c)return;
  let maxCount=getMaxServants(GS.player.rank);
  if(GS.player.servants.length>=maxCount){showToast('宫人已满');return;}
  let cost=c.trait.cost||{gold:0,silver:10};
  if(totalSilver()<cost.gold*100+cost.silver){showToast('银钱不足');return;}
  addMoney(-cost.gold,-cost.silver);
  GS.player.servants.push(c);
  showToast(`${c.name}已入你门下`);updateTopBar();closeModal();
}

function showSexDetailLog(npcId){
  initSexRecord(npcId);
  let sr=GS.sexRecords[npcId];
  let npc=findNPC(npcId);
  let npcName=npc?(npc.surname+(npc.rank||npc.fullName)):'未知';

  // 统计与每个人的次数
  let partnerCounts={};
  sr.log.forEach(entry=>{
    let detail=entry.detail||'';
    // 从detail中提取对象名
    let match=detail.match(/与(.+?)(?:私通|口交|磨镜|互扣|吃逼|操|被|临幸|侍寝|借种)/);
    if(match){
      let pName=match[1];
      if(!partnerCounts[pName])partnerCounts[pName]=0;
      partnerCounts[pName]++;
    }else{
      // 被XX临幸等
      let match2=detail.match(/被(.+?)(?:临幸|操|插入)/);
      if(match2){
        let pName=match2[1];
        if(!partnerCounts[pName])partnerCounts[pName]=0;
        partnerCounts[pName]++;
      }
    }
  });

  let html=`<div class="modal-title">${npcName} · 性事详录</div><button class="modal-close" onclick="closeModal()">✕</button>`;

  // 伴侣统计
  let partnerEntries=Object.entries(partnerCounts).sort((a,b)=>b[1]-a[1]);
  if(partnerEntries.length>0){
    html+=`<div style="font-size:11px;color:#6b4c30;margin-bottom:8px;border-bottom:1px solid rgba(180,150,100,0.2);padding-bottom:6px"><b>伴侣统计：</b></div>`;
    partnerEntries.forEach(([name,count])=>{
      html+=`<div style="font-size:10px;padding:2px 0;display:flex;justify-content:space-between"><span>${name}</span><span style="color:#e74c3c">${count}次</span></div>`;
    });
  }

  // 详细记录
  html+=`<div style="font-size:11px;color:#6b4c30;margin:8px 0 4px;border-top:1px solid rgba(180,150,100,0.2);padding-top:6px"><b>详细记录（近20条）：</b></div>`;
  html+=`<div class="history-log" style="max-height:250px">`;
  let recentLogs=sr.log.slice(-20).reverse();
  if(recentLogs.length===0)html+=`<div style="font-size:10px;color:#999;text-align:center">暂无记录</div>`;
  recentLogs.forEach(entry=>{
    html+=`<div class="history-entry"><span class="history-date">${entry.date||''}</span>${entry.detail||''}</div>`;
  });
  html+=`</div>`;
  openModal(html);
}

function openNPCInteraction(id){
  let npc=findNPC(id);if(!npc)return;
  let isEmperor=npc.type==='emperor';
  let isED=npc.type==='empress_dowager';
  let favor=npc.favor||0;
  let favorInfo=isEmperor?getLoveText(favor):getFavorText(favor);
  let pKey=npc.personality;
  let dialogueSet=CHAT_DIALOGUES[pKey]||CHAT_DIALOGUES.default;

  if(!GS.chatHistory[id])GS.chatHistory[id]=[];
  let chatLog=GS.chatHistory[id];

  // 若第一次见面，自动打招呼
  if(chatLog.length===0){
    chatLog.push({speaker:npc.fullName,text:pick(dialogueSet.greet),isPlayer:false});
  }

  renderNPCChat(id);
}

function renderNPCChat(id){
  let npc=findNPC(id);if(!npc)return;
  let isEmperor=npc.type==='emperor';
  let isED=npc.type==='empress_dowager';
  let favor=npc.favor||0;
  let favorInfo=isEmperor?getLoveText(favor):getFavorText(favor);

  let chatLog=GS.chatHistory[id]||[];

  let html=`<button class="modal-close" onclick="closeModal()">✕</button>
    <div class="npc-detail-header"><img class="npc-detail-avatar" src="${npc.avatar}"><div><div class="npc-detail-name">${npc.surname}${npc.rank||npc.fullName}</div><div class="npc-detail-rank" style="color:${favorInfo.color}">${isEmperor?'宠爱':'好感'}：${favorInfo.text}（${favor}）</div></div></div>`;

  // 聊天记录
  html+=`<div class="chat-container" id="chat-scroll">`;
  chatLog.slice(-15).forEach(msg=>{
    html+=`<div class="chat-msg ${msg.isPlayer?'player':''}">
      <img class="chat-avatar-small" src="${msg.isPlayer?GS.player.avatar:npc.avatar}">
      <div class="chat-bubble">${msg.text}</div>
    </div>`;
  });
  html+=`</div>`;

  // 操作按钮
  html+=`<div class="chat-actions">
    <button class="interact-btn" onclick="chatTalk('${id}')">交谈（⚡1）</button>
    <button class="interact-btn" onclick="chatGift('${id}')">送礼（⚡1）</button>`;
  TALENT_NAMES.forEach(t=>{html+=`<button class="interact-btn" onclick="chatTalent('${id}','${t}')">${t}论艺（⚡1）</button>`;});

  if(favor>=40&&!npc.isAlly&&!npc.isRecruited&&!isEmperor&&!isED){
    let pRI=getRankIndex(GS.player.rank),nRI=getRankIndex(npc.rank);
    if(nRI<pRI) html+=`<button class="interact-btn" onclick="allyNPC('${id}')">投诚</button>`;
    else html+=`<button class="interact-btn" onclick="recruitNPC('${id}')">招揽</button>`;
  }

  // 把柄胁迫按钮（永久标记）
  let hasHandle=GS.handles.find(h=>h.targetId===id);
  if(hasHandle&&!isEmperor&&!isED){
    html+=`<button class="interact-btn sexual" onclick="useHandle(${GS.handles.indexOf(hasHandle)})">胁迫</button>`;
  }
  if(npc.coerced&&!isEmperor&&!isED){
    html+=`<button class="interact-btn sexual" onclick="coerceNPC('${id}')">胁迫行事</button>`;
  }

  // 色情选项
  let blocked=false;
  if(npc.traits){
    let sameGenderTrait=npc.traits.find(t=>t.effect&&t.effect.sameGenderOnly);
    if(sameGenderTrait&&npc.gender!==GS.player.gender) blocked=true;
  }

  let isEasyBed=npc.traits?.find(t=>t.effect&&t.effect.easyBed);
  let flirtThreshold=isEasyBed?0:80;
  let bedThreshold=isEasyBed?0:100;

  if(favor>=flirtThreshold&&!isED&&!blocked){
    html+=`<button class="interact-btn sexual" onclick="chatFlirt('${id}')">抚摸</button>`;
    html+=`<button class="interact-btn sexual" onclick="chatMolest('${id}')">猥亵</button>`;
    html+=`<button class="interact-btn sexual" onclick="chatOral('${id}')">口交</button>`;
  }
  if(favor>=bedThreshold&&!isEmperor&&!isED&&!blocked){
    html+=`<button class="interact-btn sexual" onclick="bedNPC('${id}')">共赴巫山</button>`;
  }
  // 太后好感满可操
  if(isED&&favor>=100){
    html+=`<button class="interact-btn sexual" onclick="bedNPC('${id}')">共赴巫山</button>`;
  }

  // 外戚干政借种事件
  let hasForeignPowerTrait=npc.traits?.find(t=>t.effect&&t.effect.foreignPower);
  if(hasForeignPowerTrait&&!isEmperor&&!isED&&Math.random()<0.3&&!npc.pregnant){
    html+=`<button class="interact-btn sexual" style="background:rgba(200,100,30,0.7)" onclick="foreignPowerBreeding('${id}')">⚠ 她主动请求借种</button>`;
  }

  html+=`<button class="interact-btn" onclick="showNPCDetailReadonly('${id}')" style="background:rgba(100,80,60,0.5)">查看详情</button>`;
  html+=`</div>`;

  openModal(html);
  setTimeout(()=>{let el=document.getElementById('chat-scroll');if(el)el.scrollTop=el.scrollHeight;},100);
}

function chatGift(id){

  giftable.forEach((item)=>{

function doGiftNPC(id,itemIdx){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  let npc=findNPC(id);let item=GS.inventory[itemIdx];
  if(!npc||!item)return;
  showActionProgress(()=>{
    let favorGain=0;
    if(item.type==='artwork'){
      let tierBonus={grey:2,green:4,blue:6,purple:10,red:15};
      favorGain=tierBonus[item.tier]||3;
    }else if(item.type==='good'){
      favorGain=rand(3,8);
      let eff=item.effect;
      if(eff){
        if(eff.constitution){let gain=rand(eff.constitution[0],eff.constitution[1]);npc.constitution=clamp(npc.constitution+gain,0,1000);}
        if(eff.fertilityAdd){let gain=rand(eff.fertilityAdd[0],eff.fertilityAdd[1]);npc.fertility=clamp(npc.fertility+gain,0,100);}
        if(eff.charmAdd){let gain=rand(eff.charmAdd[0],eff.charmAdd[1]);npc.charm=clamp(npc.charm+gain,0,1000);}
      }
    }
    npc.favor=clamp(npc.favor+favorGain,-100,100);
    GS.inventory.splice(itemIdx,1);
    showToast(`赠予${npc.surname}${npc.rank||''}「${item.name}」，好感+${favorGain}`);
    closeModal();
  });
}
function chatTalk(id){
  if(GS.stamina<=0){showToast('体力不足');checkAutoAdvance();return;}
  GS.stamina--;updateTopBar();
  showActionProgress(()=>{
    let npc=findNPC(id);if(!npc)return;
    npc.favor=clamp(npc.favor+rand(1,3),-100,100);
    if(!npc.discovered)npc.discovered={personality:false,hobby:false,charm:false,constitution:false,fertility:false,scheming:false,inclination:false,talents:{}};
    npc.discovered.personality=true;

    // 更改5：交谈随机解锁对方未发现的属性
    let undiscoveredAttrs=[];
    if(!npc.discovered.hobby)undiscoveredAttrs.push('hobby');
    if(!npc.discovered.charm)undiscoveredAttrs.push('charm');
    if(!npc.discovered.constitution)undiscoveredAttrs.push('constitution');
    if(!npc.discovered.fertility)undiscoveredAttrs.push('fertility');
    if(!npc.discovered.scheming)undiscoveredAttrs.push('scheming');
    if(!npc.discovered.inclination)undiscoveredAttrs.push('inclination');
    TALENT_NAMES.forEach(t=>{if(!npc.discovered.talents)npc.discovered.talents={};if(!npc.discovered.talents[t])undiscoveredAttrs.push('talent_'+t);});
    let discoverMsg='';
    if(undiscoveredAttrs.length>0&&Math.random()<0.4){
      let toDiscover=pick(undiscoveredAttrs);
      let attrLabels={hobby:'爱好',charm:'魅力',constitution:'体质',fertility:'孕率',scheming:'心机',inclination:'倾向'};
      if(toDiscover.startsWith('talent_')){
        let tName=toDiscover.replace('talent_','');
        npc.discovered.talents[tName]=true;
        discoverMsg=`（你在交谈中得知了对方的${tName}水平）`;
      }else{
        npc.discovered[toDiscover]=true;
        let label=attrLabels[toDiscover]||toDiscover;
        if(toDiscover==='hobby'){
          discoverMsg=`（你在交谈中发现对方喜好${npc.hobby}）`;
        }else{
          discoverMsg=`（你在交谈中了解到对方的${label}情况）`;
        }
      }
    }

    let chatLog=GS.chatHistory[id]||[];
    let pKey=npc.personality;
    let dialogueSet=CHAT_DIALOGUES[pKey]||CHAT_DIALOGUES.default;
    chatLog.push({speaker:GS.player.fullName,text:'（闲聊）',isPlayer:true});
    chatLog.push({speaker:npc.fullName,text:pick(dialogueSet.talk),isPlayer:false});
    if(discoverMsg)chatLog.push({speaker:'旁白',text:discoverMsg,isPlayer:false});
    let bonusTalk=0;
    GS.player.servants.forEach(s=>{let tb=s.trait.talkBonus||0;bonusTalk+=tb;});
    npc.favor=clamp(npc.favor+bonusTalk,-100,100);
    if(discoverMsg)showToast(discoverMsg);
    updateTopBar();renderNPCChat(id);
  });
}

function acceptBreeding(id){
  let npc=findNPC(id);if(!npc)return;
  npc.favor=clamp(npc.favor+10,-100,100);
  npc.sexExperience=(npc.sexExperience||0)+1;
  GS.player.sexExperience=(GS.player.sexExperience||0)+1;
  addSexRecord(id,'player',`主动请求${GS.player.surname}${GS.player.rank}借种`);
  addNpcLog(id,`因外戚压力，主动请求${GS.player.surname}${GS.player.rank}借种`);
  addNpcLog('player',`应${npc.surname}${npc.rank}之请，为其借种`);
  takeVirginity(npc,'front',GS.player.fullName);

  // 必定内射
  if(!npc.pregnant&&npc.canBear){
    let chance=npc.fertility;
    npc.traits?.forEach(t=>{if(t.effect&&t.effect.fertilityBonus)chance+=t.effect.fertilityBonus;});
    if(Math.random()*100<chance){
      npc.pregnant=true;npc.pregnantMonth=0;npc.pregnantFather='player';
      addNpcLog(id,'有孕（借种所得）');
      showToast(`${npc.surname}${npc.rank}如愿以偿，似有了身孕。`);
    }else{
      showToast(`事毕。${npc.surname}${npc.rank}尚未有孕。`);
    }
  }

  // 给钱，根据位分
  let rankIdx=getRankIndex(npc.rank);
  let rewardSilver=Math.max(10,Math.floor((RANK_TABLE.length-rankIdx)*5));
  addMoney(0,rewardSilver);
  showToast(`${npc.surname}${npc.rank}暗中送来${rewardSilver}银作为酬谢。`);
  updateTopBar();

  window._cheatingTarget=id;
  document.getElementById('bedchamber-view').style.display='none';
  switchTab('palace');
}

function refuseBreeding(){
  showToast('你婉言拒绝，转身离去。');
  document.getElementById('bedchamber-view').style.display='none';
  switchTab('palace');
}

function renderBedDialogue(){
  let data=window._bedSceneData;if(!data)return;
  if(data.step>=data.dialogues.length){finishEmperorBed();return;}
  let d=data.dialogues[data.step];
  let bdView=document.getElementById('bedchamber-view');
  let displayText=d.text;
  // 更改8：皇帝称呼玩家名/昵称
  if(data.npc.type==='emperor'){
    let callName=getPlayerCallName();
    displayText=displayText.replace(/你/g,callName).replace(new RegExp(callName+callName,'g'),callName);
    // 避免过度替换导致不通顺，仅替换第一个"你"为称呼
    displayText=d.text;// 回退，改用更精确的方式
    if(GS.emperor&&GS.emperor.favor>=60&&GS.player.nickname){
      // 在对话开头加上称呼
      if(!displayText.startsWith(GS.player.nickname)){
        displayText=GS.player.nickname+'，'+displayText;
      }
    }
  }
  let html=`<div class="bedchamber-overlay"></div><div class="bedchamber-content"><div style="text-align:center;margin-bottom:16px"><img src="${data.npc.avatar}" style="width:60px;height:60px;border-radius:50%;border:2px solid rgba(212,175,55,0.5);object-fit:cover"></div><div class="dialogue-box"><div class="dialogue-speaker">${d.speaker}</div><div class="dialogue-text">${displayText}</div><div class="dialogue-choices">`;
  d.choices.forEach((c,i)=>{html+=`<button class="dialogue-choice-btn" onclick="chooseBedOption(${i})">${c.text}</button>`;});
  html+=`</div></div></div>`;bdView.innerHTML=html;
}

function chooseBedOption(choiceIdx){
  let data=window._bedSceneData;if(!data)return;
  let d=data.dialogues[data.step];
  data.satisfaction+=d.choices[choiceIdx].sat;
  data.step++;renderBedDialogue();
}

function finishEmperorBed(){
  let data=window._bedSceneData;if(!data)return;
  let satisfaction=data.satisfaction;
  let loveGain=0,expGain=rand(10,30),expMul=1;

  if(satisfaction>=90){loveGain=rand(8,15);expMul=2;}
  else if(satisfaction>=70){loveGain=rand(5,10);}
  else if(satisfaction>=50){loveGain=rand(2,5);}
  else loveGain=rand(-2,2);

  let prefBonus=getEmperorPreferenceBonus(GS.player);
  loveGain+=prefBonus;

  data.npc.favor=clamp(data.npc.favor+loveGain,-100,100);
  GS.player.experience+=expGain*expMul;
  data.npc.sexExperience=(data.npc.sexExperience||0)+1;

  // 记录贞操和性经验
  let holes=[];
  if(data.npc.gender==='female'){holes=['front','back'];}
  else if(data.npc.gender==='male'){holes=['back'];}
  else{holes=['front','back'];}
  let usedHole=pick(holes);
  takeVirginity(data.npc,usedHole,GS.player.fullName);
  addSexRecord(data.npc.id,'player',`被${GS.player.surname}${GS.player.rank}侍寝（${usedHole==='front'?'前穴':'后穴'}）`);

  let postures=['正面骑乘','背入式','侧卧位','龙翻身','玉女登梯','面对面坐姿','跪趴式'];
  let posture=pick(postures);
  let detailLog=`侍寝。${GS.player.surname}${GS.player.rank}以${posture}之姿，插入皇帝${usedHole==='front'?'前穴':'后穴'}`;

  addNpcLog(data.npc.id,detailLog);
  addNpcLog('player',`侍寝皇帝，${posture}，使用${usedHole==='front'?'前穴':'后穴'}`);

  let isSaoLang=data.npc.personality==='骚浪';
  let willCreampie=isSaoLang||data.npc.favor>=60;

  // 怀孕逻辑
  let canImpregnateHere=(usedHole==='front')||(usedHole==='back'&&data.npc.gender==='male');

  if(willCreampie&&!data.npc.pregnant&&canImpregnateHere){
    let pregnancyChance=30;
    if(Math.random()*100<pregnancyChance){
      data.npc.pregnant=true;data.npc.pregnantMonth=0;data.npc.pregnantFather='player';
      showToast('龙体有恙……似乎有了身孕！');
      addNpcLog(data.npc.id,'有孕');
    }else{
      showToast(satisfaction>=90?'龙颜大悦！':'侍寝结束。');
    }
  }else if(!willCreampie&&!data.npc.pregnant&&canImpregnateHere){
    let bdView=document.getElementById('bedchamber-view');
    bdView.innerHTML=`<div class="bedchamber-overlay"></div><div class="bedchamber-content"><div class="dialogue-box"><div class="dialogue-text">最后一刻……</div><div class="dialogue-choices"><button class="dialogue-choice-btn" onclick="emperorBedFinishChoice(true)">内射</button><button class="dialogue-choice-btn" onclick="emperorBedFinishChoice(false)">外射</button></div></div></div>`;
    return;

function concubineBedFinishNew(creampie){
  let data=window._bedHoleChoice;if(!data)return;
  let npc=findNPC(data.npcId);if(!npc)return;
  npc.favor=clamp(npc.favor+(data.forced?-5:5),-100,100);
  npc.lastBedWithPlayer={year:GS.date.year,month:GS.date.month};
  npc.sexExperience=(npc.sexExperience||0)+1;
  GS.player.sexExperience=(GS.player.sexExperience||0)+1;
  let ejacText=creampie?'内射':'外射';
  addNpcLog('player',`与${npc.surname}${npc.rank}私通，${ejacText}`);
  // 更新之前的履历，追加射精方式
  let logs=GS.npcHistoryLog[data.npcId];
  if(logs&&logs.length>0){
    let lastLog=logs[logs.length-1];
    if(lastLog.text.includes('私通')&&!lastLog.text.includes('射')){
      lastLog.text+=`，${ejacText}`;
    }
  }

  // 怀孕逻辑：后穴对女性/双性不会怀孕；对男性后穴内射也会怀孕
  let canImpregnate=false;
  if(creampie&&!npc.pregnant&&npc.canBear){

  window._cheatingTarget=data.npcId;
  window._bedHoleChoice=null;

}
