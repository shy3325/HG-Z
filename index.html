// ==================== 侍寝系统 ====================
function emperorSelectBedPartner(){
  let isSaoLang=GS.emperor.personality==='骚浪';

  // 皇帝怀孕时不侍寝，改为陪伴剧情
  if(GS.emperor.pregnant){
    if(Math.random()<0.4){
      return{selected:'pregnant_scene',playerChance:0,selectedName:''};
    }
    return{selected:null,playerChance:0,selectedName:''};
  }

  // 候选人：所有活着的、不在冷宫的妃嫔 + 玩家
  let candidates=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
  if(GS.player.alive&&!GS.player.inColdPalace){
    candidates.push({...GS.player,id:'player',love:GS.emperor.favor});
  }
  if(candidates.length===0)return{selected:null,playerChance:0,selectedName:''};

  // 骚浪皇帝每旬必定侍寝；其他性格有概率不侍寝
  if(!isSaoLang&&Math.random()<0.3)return{selected:null,playerChance:0,selectedName:'无人'};

  let totalWeight=0;
  let weights=candidates.map(c=>{
    let love=c.id==='player'?(GS.emperor.favor||0):(c.love||10);
    let w=Math.max(1,love+20);
    // 外戚干政侍寝概率减半
    if(c.traits){
      let hasFP=c.traits.find(t=>t.effect&&t.effect.foreignPower);
      if(hasFP)w=Math.max(1,Math.floor(w/2));
    }
    // 贿赂太监加成（仅对玩家）
    if(c.id==='player'&&GS._bribeBonus>0){
      w=w+Math.floor(totalWeight*GS._bribeBonus/(1-GS._bribeBonus+0.01));
    }
    totalWeight+=w;return w;
  });
  // 二次修正：把玩家的贿赂加成作为额外权重
  if(GS._bribeBonus>0){
    let playerIdx2=candidates.findIndex(c=>c.id==='player');
    if(playerIdx2>=0){
      let extraW=Math.floor(totalWeight*GS._bribeBonus);
      weights[playerIdx2]+=extraW;
      totalWeight+=extraW;
    }
  }

  let playerIdx=candidates.findIndex(c=>c.id==='player');
  let playerChance=playerIdx>=0?Math.round(weights[playerIdx]/totalWeight*100):0;

  let roll=Math.random()*totalWeight,cum=0,selected=candidates[0];
  for(let i=0;i<candidates.length;i++){cum+=weights[i];if(roll<=cum){selected=candidates[i];break;}}

  // 偷情检测
  if(window._cheatingTarget){
    let cheatingNPC=findNPC(window._cheatingTarget);
    if(selected.id===window._cheatingTarget){
      showToast(`皇帝驾临${cheatingNPC.surname}${cheatingNPC.rank}寝宫，发现你们苟且！双双打入冷宫！`);
      GS.player.inColdPalace=true;cheatingNPC.inColdPalace=true;
      cheatingNPC.rank='废妃';cheatingNPC.love=clamp((cheatingNPC.love||0)-80,-100,100);
      GS.player.rank='废妃';
      GS.emperorMood=clamp(GS.emperorMood-40,0,100);GS.emperor.favor=clamp(GS.emperor.favor-80,-100,100);
      addNpcLog(cheatingNPC.id,`私通被发现，贬为废妃，打入冷宫。与${GS.player.surname}苟合之事败露。`);
      addNpcLog('player',`与${cheatingNPC.surname}私通被发现，贬为废妃，打入冷宫。`);
      window._cheatingTarget=null;return{selected:null,playerChance};
    }
    if(selected.id==='player'){
      showToast(`皇帝召你侍寝，发现你不在宫中。搜查之下东窗事发！双双打入冷宫！`);
      GS.player.inColdPalace=true;GS.player.rank='废妃';
      if(cheatingNPC){cheatingNPC.inColdPalace=true;cheatingNPC.rank='废妃';cheatingNPC.love=clamp((cheatingNPC.love||0)-80,-100,100);addNpcLog(cheatingNPC.id,`因与${GS.player.surname}私通被发现，贬为废妃，打入冷宫。`);}
      GS.emperorMood=clamp(GS.emperorMood-40,0,100);GS.emperor.favor=clamp(GS.emperor.favor-80,-100,100);
      addNpcLog('player',`私通被发现，贬为废妃，打入冷宫。`);
      window._cheatingTarget=null;return{selected:null,playerChance};
    }
    window._cheatingTarget=null;
  }

  if(selected.id==='player'){
    GS._bribeBonus=0;// 被选中后清除贿赂加成
    return{selected:'player',playerChance,selectedName:'你'};
  }else{
    let npcBedPrefBonus=getEmperorPreferenceBonus(selected);
    selected.love=clamp((selected.love||0)+rand(2,5)+npcBedPrefBonus,0,100);
    let hasFPCheck=selected.traits?.find(t=>t.effect&&t.effect.foreignPower);
    if(hasFPCheck)selected.love=Math.min(selected.love,50);
    // 记录皇帝侍寝的洞和贞操
    let holes=[];
    if(selected.gender==='female'){holes=['front','back'];}
    else if(selected.gender==='male'){holes=['back'];}
    else {holes=['front','back'];}
    let usedHole=pick(holes);
    takeVirginity(selected,usedHole,GS.emperor.fullName);
    // 皇帝自己的雏鸡记录
    if(GS.emperor.virginity&&GS.emperor.virginity.dickVirginity==='尚在'){
      GS.emperor.virginity.dickVirginity=selected.fullName||selected.surname+selected.rank;
    }
    GS.emperor.sexExperience=(GS.emperor.sexExperience||0)+1;
    addSexRecord(GS.emperor.id,'others',`临幸${selected.surname}${selected.rank}（${usedHole==='front'?'前穴':'后穴'}）`);
    addSexRecord(selected.id,'emperor',`被皇帝临幸（${usedHole==='front'?'前穴':'后穴'}）`);
    selected.sexExperience=(selected.sexExperience||0)+1;

    // 详细履历
    let postures=['正面骑乘','背入式','侧卧位','龙翻身','玉女登梯'];
    let posture=pick(postures);
    let creampie=true;// 皇帝默认内射
    let creampieText='内射';

    // 根据妃子对皇帝的好感决定侍寝后的反应
    let loveToEmp=selected.loveToEmperor||0;
    let afterText='';
    let willPregnant=false;

    // 外戚干政词条：无论好感如何都主动尝试怀孕
    let hasForeignPower=selected.traits?.find(t=>t.effect&&t.effect.foreignPower);

    if(loveToEmp>=60||hasForeignPower){
      afterText=`${selected.surname}${selected.rank}承蒙圣恩，不胜欢喜，将龙精小心翼翼地堵在体内，渴望为皇家绵延血脉。`;
      willPregnant=true;
    }else if(loveToEmp>=20){
      afterText=`${selected.surname}${selected.rank}恭送圣驾之后，默默躺在榻上，既不欢喜也不抗拒。`;
      willPregnant=Math.random()<0.5;
    }else{
      afterText=`${selected.surname}${selected.rank}厌恶至极，在皇帝离去之后，迫不及待地将体内之物尽数清理干净。`;
      willPregnant=false;
    }

    let logText=`侍寝。姿势：${posture}，使用${usedHole==='front'?'前穴':'后穴'}，${creampieText}。${afterText}`;
    addNpcLog(selected.id,logText);

    // 皇帝让对方怀孕
    let canImpregnateHere=(usedHole==='front')||(usedHole==='back'&&selected.gender==='male');
    if(!selected.pregnant&&selected.canBear&&selected.fertility>0&&canImpregnateHere&&willPregnant){
      let chance=Math.floor(selected.fertility/5);
      if(Math.random()*100<chance){
        selected.pregnant=true;selected.pregnantMonth=0;selected.pregnantFather='emperor';
        addNpcLog(selected.id,'有孕（皇帝所出）');
        logText+=` 此后有孕。`;
      }
    }
    GS.lastBedMonth[selected.id]={year:GS.date.year,month:GS.date.month};
    return{selected:selected.id,playerChance,selectedName:selected.surname+selected.rank};
  }
}

// ==================== 时间推进（含旬末遮罩） ====================
function advanceXun(){
  GS._bribedThisXun=false;// 重置本旬贿赂标记
  GS.xun++;
  if(GS.xun>2){GS.xun=0;advanceMonth();}
  GS.stamina=6;
  GS.player.experience+=rand(1,3);
  checkPromotions();
  GS.concubines.forEach(c=>{
    if(c.alive){
      c.experience=(c.experience||0)+rand(1,2);
      checkNPCPromotion(c);
    }
  });

  // 皇帝性格偏好：每旬对所有活着的妃子微调圣宠
  GS.concubines.forEach(c=>{
    if(c.alive&&!c.inColdPalace){
      applyEmperorPreferenceToNPC(c);
    }
  });
  // 对玩家也应用
  applyEmperorPreferenceToPlayer();

  // NPC之间互动
  processNPCInteractions();
  processConflicts();
    // 旬结束，太医离开
  GS._doctorPresent=false;
  GS._doctorPresentDoc=null;
  processNPCAffairs();
  processNPCMedical();
  processNPCMonthlyBehavior();
  processLoveAtFirstSight();
  processUnrequitedLoveSuffering();

  // 封号赐予检测：圣宠>=80且无封号
  GS.concubines.forEach(c=>{
    if(c.alive&&!c.inColdPalace&&(c.love||0)>=80&&!c.honorTitle){
      grantTitle(c);
    }
  });
  // 用户封号
  if(GS.emperor&&GS.emperor.favor>=80&&!GS.player.honorTitle){
    if(!GS._usedTitles)GS._usedTitles=[];
    let available=TITLE_POOL.filter(t=>!GS._usedTitles.includes(t));
    if(available.length>0){
      let title=pick(available);GS._usedTitles.push(title);
      GS.player.honorTitle=title;
      addNpcLog('player',`获赐封号「${title}」`);
      showToast(`皇帝赐你封号「${title}」！`);
    }
  }

  // 词条每月效果（仅在月初旬触发）
  if(GS.xun===0){
    GS.concubines.forEach(c=>{
      if(!c.alive)return;
      c.traits?.forEach(t=>{
        if(t.effect.charmGrowth)c.charm=clamp(c.charm+t.effect.charmGrowth,0,1000);
        if(t.effect.constitutionLoss)c.constitution=clamp(c.constitution-t.effect.constitutionLoss,0,1000);
        if(t.effect.networkGrowth)c.network=clamp((c.network||0)+t.effect.networkGrowth,0,1000);
      });
    });
    // 月俸弹窗（每月上旬）
    if(!GS.monthlySalaryShown){
      GS.monthlySalaryShown=true;
      showMonthlySalaryPopup();
      return;// 先弹窗，之后再继续侍寝
    }
  }

  // 旬末遮罩：渐暗 -> 显示侍寝信息 -> 点击恢复
  showXunEndOverlay();
}

// 封号系统
function grantTitle(npc){
  if(npc.honorTitle)return;// 已有封号
  if(!GS._usedTitles)GS._usedTitles=[];
  let available=TITLE_POOL.filter(t=>!GS._usedTitles.includes(t));
  if(available.length===0)return;
  let title=pick(available);
  GS._usedTitles.push(title);
  npc.honorTitle=title;
  addNpcLog(npc.id,`获赐封号「${title}」`);
  showToast(`皇帝赐${npc.surname}${npc.rank}封号「${title}」。`);
}

function getNPCDisplayName(npc){
  if(!npc)return'???';
  if(npc.honorTitle)return npc.honorTitle+npc.surname+npc.rank;
  return npc.surname+npc.rank;
}

function getPlayerCallName(){
  if(GS.emperor&&GS.emperor.favor>=60&&GS.player.nickname){
    return GS.player.nickname;
  }
  return GS.player.fullName;
}

function getEmperorPreferenceBonus(targetNpc){
  if(!GS.emperor)return 0;
  let personality=GS.emperor.personality;
  let bonus=0;
  if(personality==='温柔')return 0;
  if(personality==='风流'){
    let charm=targetNpc.charm||0;
    if(charm>=600)bonus=rand(1,3);
    else if(charm<300)bonus=-rand(1,3);
  }else if(personality==='骚浪'){
    let dickSize=targetNpc.dickSize||0;
    if(dickSize>=23)bonus=rand(1,3);
    else if(dickSize<16)bonus=-rand(1,3);
  }else if(personality==='正直'){
    let knowledge=targetNpc.knowledge||0;
    if(knowledge>=600)bonus=rand(1,3);
    else if(knowledge<300)bonus=-rand(1,3);
  }else if(personality==='腹黑'){
    let scheming=targetNpc.scheming||0;
    if(scheming>=600)bonus=rand(1,3);
    else if(scheming<300)bonus=-rand(1,3);
  }
  return bonus;
}

function applyEmperorPreferenceToPlayer(){
  if(!GS.emperor)return;
  let bonus=getEmperorPreferenceBonus(GS.player);
  if(bonus!==0){
    GS.emperor.favor=clamp(GS.emperor.favor+bonus,-100,100);
  }
}

function applyEmperorPreferenceToNPC(npc){
  if(!GS.emperor||!npc)return;
  let bonus=getEmperorPreferenceBonus(npc);
  if(bonus!==0){
    npc.love=clamp((npc.love||0)+bonus,0,100);
    let hasFP=npc.traits?.find(t=>t.effect&&t.effect.foreignPower);
    if(hasFP)npc.love=Math.min(npc.love,50);
  }
}

function processNPCAffairs(){
  let aliveC=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
  let interFreq=GS.settings.interactionFrequency||'medium';
  let interChance=interFreq==='low'?0.08:(interFreq==='high'?0.30:0.18);
  let affairAllowed=GS.settings.allowAffairs;

  aliveC.forEach(c=>{
    // 正面互动（交友、好感增长）——不受对食开关影响
    if(Math.random()<interChance){
      let partner=pick(aliveC.filter(x=>x.id!==c.id));
      if(partner){
        let rel=getNpcRelation(c.id,partner.id);
        let gain=rand(2,6);
        // 如果对食关闭，好感上限60（仅友谊）
        let capVal=affairAllowed?100:60;
        setNpcRelation(c.id,partner.id,clamp(rel+gain,-100,capVal));
      }
    }

    // 偷情/恋爱行为——仅在对食开启时触发
    if(!affairAllowed)return;

    let isEasyBed=c.traits?.find(t=>t.effect&&t.effect.activeAffair);
    if(isEasyBed&&Math.random()<0.15){
      let partner=pick(aliveC.filter(x=>x.id!==c.id));
      if(partner){
        let rel=getNpcRelation(c.id,partner.id);
        setNpcRelation(c.id,partner.id,clamp(rel+rand(3,8),-100,100));
        if(rel>=40&&Math.random()<0.3){
          performNPCIntercourse(c,partner);
        }
      }
    }
    if(Math.random()<0.05){
      let partner=pick(aliveC.filter(x=>x.id!==c.id));
      if(partner){
        let rel=getNpcRelation(c.id,partner.id);
        if(rel>=60&&Math.random()<0.2){
          performNPCIntercourse(c,partner);
        }
      }
    }
  });
}

// 更改8：爱上一个人导致对其他人好感下降
function processLoveExclusivity(lover,beloved){
  // 对食关闭时不触发爱情排他性
  if(!GS.settings.allowAffairs)return;
  let rel=getNpcRelation(lover.id,beloved.id);
  if(rel>=60){
    // 对其他人好感>60的下降
    let aliveC=GS.concubines.filter(c=>c.alive&&c.id!==lover.id&&c.id!==beloved.id);
    aliveC.forEach(other=>{
      let otherRel=getNpcRelation(lover.id,other.id);
      if(otherRel>60){
        setNpcRelation(lover.id,other.id,clamp(otherRel-rand(3,8),-100,100));
      }
    });
    // 对皇帝的爱也下降
    if(lover.loveToEmperor!==undefined&&lover.loveToEmperor>60){
      lover.loveToEmperor=clamp(lover.loveToEmperor-rand(5,15),-100,100);
    }
  }
}

function processNPCMedical(){
  GS.concubines.forEach(c=>{
    if(!c.alive||c.inColdPalace)return;
    // 半年一次：medicalThisYear上限改为1（每年最多2次=每半年1次），并且增加月份判定
    // 实现方式：每6个月才允许一次，用lastMedicalMonth记录
    if(c.constitution<300){
      if(!c._lastMedicalMonth)c._lastMedicalMonth={year:0,month:0};
      let monthsSinceLast=(GS.date.year-c._lastMedicalMonth.year)*12+(GS.date.month-c._lastMedicalMonth.month);
      if(monthsSinceLast>=6&&Math.random()<0.2){
        let gain=rand(50,100);
        c.constitution=clamp(c.constitution+gain,0,1000);
        c._lastMedicalMonth={year:GS.date.year,month:GS.date.month};
        addNpcLog(c.id,`请太医调理身体，体质增加${gain}`);
        // 概率与太医私通
        if(GS.doctors.length>0&&Math.random()<0.08){
          let doc=pick(GS.doctors);
          addNpcLog(c.id,`与太医${doc.fullName}暗中私通`);
          c.sexExperience=(c.sexExperience||0)+1;
          addSexRecord(c.id,'others',`与太医${doc.fullName}私通`);
          if(!GS.outsidePersonnel.find(o=>o.id===doc.id))GS.outsidePersonnel.push(doc);
        }
      }
    }
  });
}

function processNPCMonthlyBehavior(){
  let aliveC=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
  aliveC.forEach(c=>{
    // 每个妃子每旬有概率进行社交行为
    if(Math.random()<0.25){
      let actions=['结交','讨好','示好','拜访','送礼','闲聊'];
      let action=pick(actions);
      let targets=aliveC.filter(x=>x.id!==c.id);
      if(targets.length===0)return;
      let target=pick(targets);
      let rel=getNpcRelation(c.id,target.id);
      let change=rand(1,5);
      setNpcRelation(c.id,target.id,clamp(rel+change,-100,100));
      // 高倾向的妃子概率害人
      if(c.inclination>60&&Math.random()<0.15){
        let victim=pick(targets.filter(x=>getNpcRelation(c.id,x.id)<0));
        if(victim){
          let vRel=getNpcRelation(c.id,victim.id);
          setNpcRelation(c.id,victim.id,clamp(vRel-rand(3,8),-100,100));
          addNpcLog(c.id,`暗中针对${victim.surname}${victim.rank}`);
        }
      }
    }
    // 外戚干政妃子主动结交势力
    let hasFP=c.traits?.find(t=>t.effect&&t.effect.foreignPower);
    if(hasFP&&Math.random()<0.2){
      let target=pick(aliveC.filter(x=>x.id!==c.id));
      if(target){
        let rel=getNpcRelation(c.id,target.id);
        setNpcRelation(c.id,target.id,clamp(rel+rand(3,8),-100,100));
        if(rel+5>30) addNpcLog(c.id,`与${target.surname}${target.rank}结为党羽`);
      }
    }
  });
}

// 更改9：一见钟情事件
function processLoveAtFirstSight(){
  // 对食关闭时不触发一见钟情
  if(!GS.settings.allowAffairs)return;
  if(!GS._loveAtFirstSightChecked)GS._loveAtFirstSightChecked={};
  let aliveC=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
  aliveC.forEach(c=>{
    aliveC.forEach(target=>{
      if(c.id===target.id)return;
      let checkKey=c.id+'_'+target.id;
      if(GS._loveAtFirstSightChecked[checkKey])return;// 一生只判定一次
      GS._loveAtFirstSightChecked[checkKey]=true;
      if(Math.random()<0.05){
        // 一见钟情！
        setNpcRelation(c.id,target.id,clamp(getNpcRelation(c.id,target.id)+rand(40,70),-100,100));
        addNpcLog(c.id,`对${target.surname}${target.rank}一见钟情，心中燃起无法遏制的爱慕之火`);
        // 标记单恋
        if(!c._crushOn)c._crushOn=[];
        c._crushOn.push({targetId:target.id,startMonth:GS.date.month,startYear:GS.date.year});
        // 开始追求行为
        addNpcLog(c.id,`开始暗中追求${target.surname}${target.rank}`);
      }
    });
  });
}

// 单恋痛苦：每三个月判定
function processUnrequitedLoveSuffering(){
  // 对食关闭时不触发单恋痛苦
  if(!GS.settings.allowAffairs)return;
  let aliveC=GS.concubines.filter(c=>c.alive);
  aliveC.forEach(c=>{
    if(!c._crushOn||c._crushOn.length===0)return;
    c._crushOn.forEach(crush=>{
      let target=findNPC(crush.targetId);
      if(!target||!target.alive)return;
      let targetRelToC=getNpcRelation(target.id,c.id);
      // 如果对方好感低于40，则为单恋痛苦
      if(targetRelToC<40){
        let monthsElapsed=(GS.date.year-crush.startYear)*12+(GS.date.month-crush.startMonth);
        if(monthsElapsed>0&&monthsElapsed%3===0&&Math.random()<0.5){
          let loss=rand(30,90);
          c.constitution=clamp(c.constitution-loss,0,1000);
          addNpcLog(c.id,`因${target.surname}${target.rank}不爱自己而痛苦寝食难安，体质下降${loss}`);
        }
      }
    });
  });
}

// 体质过低死亡判定
function processLowConstitutionDeath(){
  let allNPCs=[...GS.concubines];
  allNPCs.forEach(c=>{
    if(!c.alive)return;
    if(c.constitution<=0){
      c.alive=false;
      addNpcLog(c.id,'久病难医，身体油尽灯枯，溘然长逝');
      showToast(`${c.surname}${c.rank}身体虚弱至极，久病难医，已然离世。`);
      GS.emperorMood=clamp(GS.emperorMood-rand(5,15),0,100);
      return;
    }
    if(c.constitution<100){
      let deathChance=0;
      if(c.constitution>=90)deathChance=0.10;
      else if(c.constitution>=80)deathChance=0.20;
      else if(c.constitution>=70)deathChance=0.30;
      else if(c.constitution>=60)deathChance=0.40;
      else if(c.constitution>=50)deathChance=0.50;
      else if(c.constitution>=40)deathChance=0.60;
      else if(c.constitution>=30)deathChance=0.70;
      else if(c.constitution>=20)deathChance=0.80;
      else if(c.constitution>=10)deathChance=0.90;
      else deathChance=0.95;
      if(Math.random()<deathChance){
        c.alive=false;
        let deathTexts=[
          `${c.surname}${c.rank}缠绵病榻多日，终是药石无灵，撒手人寰。`,
          `${c.surname}${c.rank}身子骨早已虚弱不堪，今晨宫人发现时已然气绝。`,
          `${c.surname}${c.rank}久病难医，太医连连摇头，入夜后便咽了气。`,
          `${c.surname}${c.rank}形容枯槁，连日高烧不退，终究没能熬过这个月。`,
        ];
        addNpcLog(c.id,'身体虚弱，久病难医，不幸离世');
        showToast(pick(deathTexts));
        GS.emperorMood=clamp(GS.emperorMood-rand(5,15),0,100);
      }
    }
  });
  // 玩家也判定
  if(GS.player.alive&&GS.player.constitution<=0){
    GS.player.alive=false;
    showToast('你的身体终于支撑不住了……一切归于黑暗。');
  }
  if(GS.player.alive&&GS.player.constitution<100){
    let deathChance=0;
    if(GS.player.constitution>=90)deathChance=0.10;
    else if(GS.player.constitution>=80)deathChance=0.20;
    else if(GS.player.constitution>=70)deathChance=0.30;
    else if(GS.player.constitution>=60)deathChance=0.40;
    else if(GS.player.constitution>=50)deathChance=0.50;
    else if(GS.player.constitution>=40)deathChance=0.60;
    else if(GS.player.constitution>=30)deathChance=0.70;
    else if(GS.player.constitution>=20)deathChance=0.80;
    else if(GS.player.constitution>=10)deathChance=0.90;
    else deathChance=0.95;
    if(Math.random()<deathChance){
      GS.player.alive=false;
      showToast('你缠绵病榻，药石无灵……一代红颜，就此凋零。');
    }
  }
}

  let content=document.getElementById('xun-end-content');

  let bedText='';

function renderPregnantSceneStep(){
  let data=window._pregnantSceneData;if(!data)return;

    GS.emperor.favor=clamp(GS.emperor.favor+rand(2,5),-100,100);
    showToast('陪伴结束，宠爱微增。');
    addNpcLog('player','陪伴有孕皇帝（'+scene.title+'）');

    switchTab('palace');return;
  }

  let d=scene.dialogues[data.step];
  let bdView=document.getElementById('bedchamber-view');

  if(d.speaker==='emperor'){
    let speakerName=GS.emperor.fullName;
    let sceneText=d.text;
    // 更改8：皇帝盛宠>60时用昵称称呼玩家
    if(GS.emperor&&GS.emperor.favor>=60&&GS.player.nickname){
      sceneText=sceneText.replace(/你(?!们)/,GS.player.nickname+'，你');
    }
    let html=`<div class="bedchamber-overlay"></div><div class="bedchamber-content"><div style="text-align:center;margin-bottom:16px"><img src="${GS.emperor.avatar}" style="width:60px;height:60px;border-radius:50%;border:2px solid rgba(212,175,55,0.5);object-fit:cover" loading="lazy"></div><div class="dialogue-box"><div class="dialogue-speaker">${speakerName}</div><div class="dialogue-text">${sceneText}</div><div class="dialogue-choices"><button class="dialogue-choice-btn" onclick="pregnantSceneNext()">继续</button></div></div></div>`;
    bdView.innerHTML=html;
    data.step++;
  }else if(d.speaker==='player_choice'){
    let choicesHtml=d.choices.map((c,i)=>`<button class="dialogue-choice-btn" onclick="pregnantSceneChoice(${i})">${c.text}</button>`).join('');
    let html=`<div class="bedchamber-overlay"></div><div class="bedchamber-content"><div class="dialogue-box"><div class="dialogue-speaker">你的选择</div><div class="dialogue-choices">${choicesHtml}</div></div></div>`;
    bdView.innerHTML=html;
  }
}

function pregnantSceneNext(){renderPregnantSceneStep();}

function pregnantSceneChoice(idx){

  let choice=d.choices[idx];

function advanceMonth(){
  GS.date.month++;
  GS.monthlySalaryShown=false;
  GS.emperorVisitedThisMonth=false;
  if(GS.date.month>12){
    GS.date.month=1;GS.date.year++;
    GS.player.age++;
    GS.concubines.forEach(c=>{if(c.alive){c.age++;c.medicalThisYear=0;}});
    if(GS.emperor)GS.emperor.age++;
    if(GS.empressDowager)GS.empressDowager.age++;
    GS.children.forEach(child=>{
      if(!child.alive)return;
      child.age++;
      if(child.age>=10){
        let knowledgeGain=Math.floor(rand(1,5)*(child.talent/50));
        let martialGain=Math.floor(rand(1,4)*(child.talent/60));
        child.knowledge=clamp((child.knowledge||0)+knowledgeGain,0,child.talent);
        child.martial=clamp((child.martial||0)+martialGain,0,child.talent);
      }
    });
    if(GS.player.age>=GS.player.lifespan){showToast('岁月无情，你的生命走到了尽头……');}
    if(GS.date.year%GS.settings.selectionInterval===0)triggerSelection();
  }

  if(GS.player.rank==='皇后'&&!GS.hasPalacePower){GS.hasPalacePower=true;showToast('你已晋封皇后，自动获得宫权！');}

  // 月俸发放
  let salary=getSalary(GS.player.rank);
  let salaryTotalSilver=salary.gold*100+salary.silver;
  addMoney(salary.gold,salary.silver);
  let servantCostSilver=GS.player.servants.length;
  addMoney(0,-servantCostSilver);

  let dietBase=salaryTotalSilver;
  let dietCost=0;
  if(GS.settings.diet==='frugal'){
    dietCost=Math.floor(dietBase/3);
    GS.player.constitution=clamp(GS.player.constitution-rand(5,10),0,1000);
  }else if(GS.settings.diet==='luxury'){
    dietCost=Math.floor(dietBase*2/3);
    GS.player.constitution=clamp(GS.player.constitution+rand(5,10),0,1000);
  }else{
    dietCost=Math.floor(dietBase/2);
  }
  dietCost=Math.min(dietCost,salaryTotalSilver);
  addMoney(0,-dietCost);

  // 每三个月妃子圣宠下降判定（未侍寝则下降）
  if(GS.date.month%3===0){
    GS.concubines.forEach(c=>{
      if(!c.alive||c.inColdPalace)return;
      // 检查最近三个月内是否被侍寝过
      let wasServiced=GS.lastBedMonth[c.id];
      let servicedRecently=false;
      if(wasServiced){
        let monthsDiff=(GS.date.year-wasServiced.year)*12+(GS.date.month-wasServiced.month);
        if(monthsDiff<=3)servicedRecently=true;
      }
      if(!servicedRecently){
        c.love=clamp((c.love||0)-rand(2,5),0,100);
      }
    });
  }

  // 月初册封判定
  processMonthlyPromotions();

  // 体质过低死亡判定
  processLowConstitutionDeath();

  processPregnancies();
  processServantGathering();
  GS.emperorMood=clamp(GS.emperorMood+rand(3,8),0,100);

  // 资历增加：生孩子等事件在其他地方处理
}

function processMonthlyPromotions(){
  // 玩家晋升判定
  let p=GS.player;
  if(!p.expCap)p.expCap=getExpCapForRank(p.rank);
  if(p.experience>=p.expCap){
    let currentIdx=getRankIndex(p.rank);
    if(currentIdx>0){
      let canPromote=true;
      if(GS.emperor.favor<60)canPromote=false;
      let needChild=currentIdx<=15;
      if(needChild&&(!p.children||p.children.length===0))canPromote=false;
      if(canPromote){
        let newRank=assignRank({rank:''},currentIdx-1);
        if(newRank&&newRank!==p.rank){
          let oldRank=p.rank;
          p.rank=newRank;
          p.experience=0;
          p.expCap=getExpCapForRank(newRank);
          showPromotionPopup(p.fullName,oldRank,newRank);
          addNpcLog('player',`由${oldRank}晋封为${newRank}`);
          if(newRank==='皇后'&&!GS.hasPalacePower){GS.hasPalacePower=true;}
        }
      }
    }
  }

  // 其他妃子晋升判定
  GS.concubines.forEach(c=>{
    if(!c.alive||c.inColdPalace)return;
    if(!c.expCap)c.expCap=getExpCapForRank(c.rank);
    if((c.experience||0)>=c.expCap){
      let currentIdx=getRankIndex(c.rank);
      if(currentIdx<=0)return;
      if((c.love||0)<60)return;
      let needChild=currentIdx<=15;
      if(needChild&&(!c.children||c.children.length===0))return;
      let hasFP=c.traits?.find(t=>t.effect&&t.effect.foreignPower);
      let targetIdx=currentIdx-1;
      if(hasFP&&targetIdx===0)targetIdx=1;
      // 外戚干政不可为皇后
      let hasCNBE=c.traits?.find(t=>t.effect&&t.effect.cannotBeEmpress);
      if(hasCNBE&&targetIdx===0)targetIdx=1;
      let newRank=assignRank(c,targetIdx);
      if(newRank&&newRank!==c.rank){
        let oldRank=c.rank;
        c.rank=newRank;
        c.experience=0;
        c.expCap=getExpCapForRank(newRank);
        addNpcLog(c.id,`由${oldRank}晋封为${newRank}`);
        if(hasFP)c.love=Math.min(c.love,50);
      }
    }
  });
}

function processPregnancies(){
  let allNPCs=[...GS.concubines];
  if(GS.emperor&&GS.emperor.pregnant)allNPCs.push(GS.emperor);
  // 太医怀孕处理
  GS.doctors.forEach(doc=>{
    if(doc.pregnant){
      doc.pregnantMonth=(doc.pregnantMonth||0)+1;
      if(doc.pregnantMonth>=10){
        // 太医生下私生子
        let childGender=Math.random()<0.5?'female':'male';
        let child={
          name:doc.surname+pick(childGender==='female'?FEMALE_NAMES:MALE_NAMES),
          gender:childGender,age:0,alive:true,
          motherName:doc.fullName,motherId:doc.id,
          officialFather:'player',foreignBlood:false,
          talent:rand(10,80),constitution:rand(20,60),appearance:rand(20,60),
          personality:pick(CHILD_PERSONALITIES),knowledge:0,martial:0,
          favorToPlayer:rand(10,30),imperialFavor:0,isPrivate:true,
          avatar:assignAvatar(genderAvatarType(childGender)),
        };
        GS.children.push(child);
        doc.pregnant=false;doc.pregnantMonth=0;doc.pregnantFather=null;
        doc.constitution=clamp(doc.constitution-rand(50,100),0,1000);
        doc.fertility=clamp(doc.fertility-10,0,100);
        addNpcLog('player',`太医${doc.fullName}为你诞下私生子${child.name}`);
        showToast(`太医${doc.fullName}暗中诞下一名孩子……`);
      }
    }
  });
  allNPCs.forEach(npc=>{
    if(!npc.pregnant||!npc.alive)return;
    npc.pregnantMonth=(npc.pregnantMonth||0)+1;
    if(npc.pregnantMonth>=10) giveBirth(npc);
  });
}

function giveBirth(npc){
  let isEmperor=npc.type==='emperor';
  // 难产（皇帝不触发）
  if(!isEmperor&&npc.constitution<100){
    let d=Math.random();
    if(d<0.3){npc.alive=false;showToast(`${npc.surname}${npc.rank}难产，母子俱亡。`);GS.emperorMood=clamp(GS.emperorMood-30,0,100);addNpcLog(npc.id,'难产身亡');npc.pregnant=false;return;}
    else if(d<0.6){npc.alive=false;let child=createChild(npc);let aliveC=GS.concubines.filter(c=>c.alive&&!c.inColdPalace&&c.id!==npc.id);showToast(`${npc.surname}${npc.rank}难产身亡，孩子存活。`);GS.emperorMood=clamp(GS.emperorMood-25,0,100);addNpcLog(npc.id,'难产身亡');npc.pregnant=false;return;}
    else{npc.canBear=false;createChild(npc);showToast(`${npc.surname}${npc.rank}九死一生，此后再无生育之望。`);npc.pregnant=false;npc.constitution=clamp(npc.constitution-rand(100,200),0,1000);npc.fertility=clamp(npc.fertility-10,0,100);addNpcLog(npc.id,'难产，幸存，绝育');return;}
  }

  let child=createChild(npc);
  npc.pregnant=false;npc.pregnantMonth=0;
  npc.constitution=clamp(npc.constitution-rand(100,200),0,1000);
  npc.fertility=clamp(npc.fertility-10,0,100);
  npc.experience=(npc.experience||0)+rand(15,30);// 生孩子增加资历

  if(npc.pregnantFather==='player'&&!isEmperor){
    let lastBed=GS.lastBedMonth[npc.id];
    if(lastBed){
      let monthDiff=(GS.date.year-lastBed.year)*12+(GS.date.month-lastBed.month);
      if(monthDiff<=11&&monthDiff>=9){
        showToast(`${npc.surname}${npc.rank}诞下${child.gender==='male'?'皇子':'公主'}，皇帝深信不疑。`);
        child.officialFather='emperor';addNpcLog(npc.id,`诞下${child.gender==='male'?'皇子':'公主'}（蒙混过关）`);
      }else{
        showToast(`皇帝追查日期，发现孩子并非龙种！龙颜大怒！`);
        GS.emperorMood=clamp(GS.emperorMood-50,0,100);npc.alive=false;
        addNpcLog(npc.id,'私通被揭，被处死');
        if(GS.player.network<200){
          GS.player.inColdPalace=true;addNpcLog('player','私通被揭');
          if(GS.player.network<50){GS.player.alive=false;showToast('皇帝下旨赐死……');}
          else showToast('你被打入冷宫！');
        }else showToast('幸而你人脉广博，未被牵连。');
      }
    }
  }else if(isEmperor&&npc.pregnantFather==='player'){
    child.officialFather='player';
    showToast(`皇帝诞下${child.gender==='male'?'龙子':'龙女'}，记于你的名下！`);
    addNpcLog(npc.id,`诞下${child.gender==='male'?'龙子':'龙女'}（记于${GS.player.surname}${GS.player.rank}名下）`);
    addNpcLog('player',`皇帝为你诞下${child.gender==='male'?'龙子':'龙女'}`);
  }else{
    showToast(`${npc.surname}${npc.rank}诞下${child.gender==='male'?'皇子':'公主'}。`);
    addNpcLog(npc.id,`诞下${child.gender==='male'?'皇子':'公主'}`);
  }
  npc.pregnantFather=null;
}

function createChild(mother){
  let hasTwinTrait=mother.traits?.some(t=>t.effect&&t.effect.twinChance);
  let twinChance=hasTwinTrait?0.5:0.1;
  let roll=Math.random();
  let children=[];

  function makeChild(mother){
    // 性别：45%女 45%男 10%双性
    let gRoll=Math.random();
    let g;
    if(gRoll<0.45)g='female';
    else if(gRoll<0.9)g='male';
    else g='bisexual';

    let isForeignMother=mother.traits?.some(t=>t.effect&&t.effect.foreignTribute);
    let isPlayerFather=mother.pregnantFather==='player';
    let isEmperorFather=mother.pregnantFather==='emperor';
    let canBeHeir=(g==='male'||g==='bisexual')&&!isForeignMother;

    // 更改7：天资由双方学识决定
    let fatherKnowledge=0;
    if(isPlayerFather){fatherKnowledge=GS.player.knowledge||0;}
    else if(isEmperorFather){fatherKnowledge=GS.emperor?(GS.emperor.knowledge||0):500;}
    else{
      let fatherNpc=findNPC(mother.pregnantFather);
      fatherKnowledge=fatherNpc?(fatherNpc.knowledge||0):300;
    }
    let motherKnowledge=mother.knowledge||0;
    let avgKnowledge=Math.floor((fatherKnowledge+motherKnowledge)/2);
    let talentBase=Math.floor(avgKnowledge/10);
    let childTalent=clamp(rand(talentBase,talentBase+10),0,100);

    let childConstitution=rand(20,80);
    let childAppearance=rand(20,80);
    let childPersonality=pick(CHILD_PERSONALITIES);
    let initImperialFavor=0;
    if(isEmperorFather&&canBeHeir)initImperialFavor=20;

    // 更改2：孩子跟随皇帝的姓
    let emperorSurname=GS.emperor?GS.emperor.surname:'皇';

    return {
      name:`${emperorSurname}${g==='female'?pick(FEMALE_NAMES):pick(MALE_NAMES)}`,
      gender:g,
      age:0,
      alive:true,
      motherName:mother.fullName,
      motherId:mother.id,
      officialFather:isPlayerFather?'player':'emperor',
      foreignBlood:isForeignMother||false,
      talent:childTalent,
      constitution:childConstitution,
      appearance:childAppearance,
      personality:childPersonality,
      knowledge:0,
      martial:0,
      favorToPlayer:rand(0,20),
      imperialFavor:initImperialFavor,
      avatar:assignAvatar(genderAvatarType(g)),
    };
  }

  if(roll<twinChance){
    children.push(makeChild(mother));
    children.push(makeChild(mother));
    showToast('竟是双生子！');
  }else{
    children.push(makeChild(mother));
  }
  children.forEach(c=>{GS.children.push(c);mother.children.push(c.name);});
  return children[0];
}

function processServantGathering(){
  GS.player.servants.forEach(s=>{
    let gatherChance=s.trait.gatherMedicine||0;
    if(gatherChance>0&&Math.random()<gatherChance){
      let medicine=pick(MEDICINE_ITEMS);GS.inventory.push({...medicine});
      showToast(`宫人${s.name}寻得「${medicine.name}」。`);
    }
    let nb=s.trait.networkBonus||0;
    if(nb>0) GS.player.network=clamp(GS.player.network+nb,0,1000);
  });
}

function processNPCInteractions(){
  let aliveC=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
  let interFreq=GS.settings.interactionFrequency||'medium';
  let baseChance=interFreq==='low'?0.08:(interFreq==='high'?0.25:0.15);
  let affairAllowed=GS.settings.allowAffairs;
  for(let i=0;i<aliveC.length;i++){
    if(Math.random()<baseChance){
      let other=pick(aliveC.filter(c=>c.id!==aliveC[i].id));
      if(!other)continue;
      let rel=getNpcRelation(aliveC[i].id,other.id);
      let change=rand(-5,5);
      let newVal=rel+change;
      // 对食关闭时好感上限60
      if(!affairAllowed)newVal=Math.min(newVal,60);
      setNpcRelation(aliveC[i].id,other.id,newVal);
      let newRel=getNpcRelation(aliveC[i].id,other.id);
      if(newRel>40&&rel<=40){addNpcLog(aliveC[i].id,`与${other.surname}${other.rank}交好`);addNpcLog(other.id,`与${aliveC[i].surname}${aliveC[i].rank}交好`);}
      if(newRel<-30&&rel>=-30){addNpcLog(aliveC[i].id,`与${other.surname}${other.rank}交恶`);addNpcLog(other.id,`与${aliveC[i].surname}${aliveC[i].rank}交恶`);}
    }
  }
}

function processConflicts(){
  let freq=GS.settings.conflictFrequency;
  let chance=freq==='low'?0.05:(freq==='high'?0.2:0.1);
  if(Math.random()<chance){
    let aliveConc=GS.concubines.filter(c=>c.alive&&!c.inColdPalace);
    if(aliveConc.length<2)return;
    let aggressors=aliveConc.filter(c=>Math.random()*100<c.inclination);
    if(aggressors.length===0)aggressors=[pick(aliveConc)];
    let aggressor=pick(aggressors);
    let victim=pick(aliveConc.filter(c=>c.id!==aggressor.id));
    if(!victim)return;

    let eventType=Math.random()<0.5?'rumor':'poison';
    if(eventType==='rumor'){
      victim.love=clamp((victim.love||0)-rand(3,8),0,100);
      GS.emperorMood=clamp(GS.emperorMood-rand(2,5),0,100);
      addNpcLog(aggressor.id,`散布了关于${victim.surname}${victim.rank}的谣言`);
      addNpcLog(victim.id,`被${aggressor.surname}${aggressor.rank}造谣`);
      showToast(`传闻${aggressor.surname}${aggressor.rank}散布了关于${victim.surname}${victim.rank}的谣言。`);
      // 绿茶性格：维持表面友好，对方好感不减
      if(aggressor.personality==='绿茶'){
        // 对方依然以为关系好，不减好感
        let rel=getNpcRelation(aggressor.id,victim.id);
        // 绿茶对对方的真实好感低，但对方对绿茶的好感保持
        // 这里aggressor对victim的好感减少，但victim对aggressor的好感不变
        setNpcRelation(aggressor.id,victim.id,clamp(rel-5,-100,100));
      }else{
        setNpcRelation(aggressor.id,victim.id,clamp(getNpcRelation(aggressor.id,victim.id)-10,-100,100));
      }
    }else{
      let detected=false;
      let poisonResist=victim.traits?.find(t=>t.effect&&t.effect.poisonResist);
      if(poisonResist&&Math.random()<poisonResist.effect.poisonResist){detected=true;}
      if(victim.id==='player'){GS.player.servants.forEach(s=>{let dp=s.trait.detectPoison||0;if(dp>0&&Math.random()<dp)detected=true;});}
      else{(victim.servants||[]).forEach(s=>{let dp=s.trait.detectPoison||0;if(dp>0&&Math.random()<dp)detected=true;});}
      // 记录下毒者
      if(!GS.poisonRecords[victim.id])GS.poisonRecords[victim.id]=[];
      GS.poisonRecords[victim.id].push({
        date:`${GS.date.era}${GS.date.year}年${GS.date.month}月`,
        poisoner:aggressor.id,
        poisonerName:aggressor.surname+aggressor.rank,
        detected:detected,
      });
      if(detected){
        showToast(`有人试图对${victim.surname}${victim.rank}下毒，被察觉阻止！`);
        GS.emperorMood=clamp(GS.emperorMood-rand(5,10),0,100);
        addNpcLog(victim.id,`被${aggressor.surname}${aggressor.rank}下毒，幸被阻止`);
        addNpcLog(aggressor.id,`对${victim.surname}${victim.rank}下毒，被发现`);
        // 被发现才减好感
        setNpcRelation(aggressor.id,victim.id,clamp(getNpcRelation(aggressor.id,victim.id)-30,-100,100));
        aggressor.love=clamp((aggressor.love||0)-10,0,100);
      }else{
        victim.constitution=clamp(victim.constitution-rand(50,150),0,1000);
        addNpcLog(victim.id,`被暗中下毒（下毒者：${aggressor.surname}${aggressor.rank}，未被发现）`);
        addNpcLog(aggressor.id,`暗中对${victim.surname}${victim.rank}下毒，未被发现`);
        if(victim.constitution<=0){victim.alive=false;showToast(`${victim.surname}${victim.rank}不幸中毒身亡！`);GS.emperorMood=clamp(GS.emperorMood-rand(20,40),0,100);addNpcLog(victim.id,'中毒身亡');}
        else{showToast(`${victim.surname}${victim.rank}不慎中毒，幸得太医救治。`);GS.emperorMood=clamp(GS.emperorMood-rand(5,10),0,100);}
      }
    }
  }
}

function triggerSelection(){
  let count;
  if(GS.settings.selectionCount==='few')count=rand(1,3);
  else if(GS.settings.selectionCount==='many')count=rand(5,8);
  else count=rand(3,5);
  for(let i=0;i<count;i++){
    let gender=Math.random()<0.6?'female':'male';
    let npc=generateNPC('concubine',null,gender);
    // 位分在最低三个中随机
    let lowestIdx=RANK_TABLE.length-1;
    let randomLowest=lowestIdx-rand(0,2);
    npc.rank=assignRank(npc,randomLowest);npc.age=rand(14,18);
    GS.concubines.push(npc);GS.metNPCs.push(npc.id);
  }
  showToast(`选秀结束，${count}位新人入宫。`);
}

// ==================== 存档系统 ====================
function showSaveModal(){
  let html=`<div class="modal-title">存 档</div><button class="modal-close" onclick="closeModal()">✕</button>`;
  for(let i=1;i<=3;i++){
    let saveData=localStorage.getItem('harem_save_'+i);
    let info=saveData?'已有存档':'空档位';
    if(saveData){try{let d=JSON.parse(saveData);info=`${d.date?.era||''}${d.date?.year||''}年${d.date?.month||''}月 - ${d.player?.fullName||''}`;}catch(e){}}
    html+=`<div class="save-slot" onclick="saveGame(${i})"><div class="save-slot-title">档位 ${i}</div><div class="save-slot-info">${info}</div></div>`;
  }
  openModal(html);
}

function showLoadModal(){
  let html=`<div class="modal-title">读 档</div><button class="modal-close" onclick="closeModal()">✕</button>`;
  for(let i=1;i<=3;i++){
    let saveData=localStorage.getItem('harem_save_'+i);
    let info=saveData?'已有存档':'空档位';
    if(saveData){try{let d=JSON.parse(saveData);info=`${d.date?.era||''}${d.date?.year||''}年${d.date?.month||''}月 - ${d.player?.fullName||''}`;}catch(e){}}
    html+=`<div class="save-slot" onclick="loadGame(${i})" ${!saveData?'style="opacity:0.5;pointer-events:none"':''}><div class="save-slot-title">档位 ${i}</div><div class="save-slot-info">${info}</div></div>`;
  }
  openModal(html);
}

function saveGame(slot){
  let saveObj=JSON.parse(JSON.stringify(GS));
  localStorage.setItem('harem_save_'+slot,JSON.stringify(saveObj));
  showToast(`已保存至档位 ${slot}`);closeModal();
}

function loadGame(slot){
  let saveData=localStorage.getItem('harem_save_'+slot);
  if(!saveData){showToast('空档位');return;}
  try{
    GS=JSON.parse(saveData);
    document.getElementById('cover-page').style.display='none';
    document.getElementById('creation-page').style.display='none';
    document.getElementById('prologue-page').style.display='none';
    document.getElementById('game-page').style.display='block';
    updateTopBar();switchTab('palace');showToast(`已读取档位 ${slot}`);closeModal();
  }catch(e){showToast('存档损坏');}
}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
